<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Uncapped · Underwriting</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23063844'/%3E%3Ctext x='16' y='24' font-family='Inter,Arial,sans-serif' font-size='22' font-weight='800' fill='%23ffffff' text-anchor='middle'%3Eu%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== Back-office design tokens (uncapped-design → references/back-office.md) ===== */
:root{
  --brand-600:#128081; --brand-700:#00696b; --brand-200:#eaf6f6; --brand-300:#c1e5e6; --brand-100:#f1f9f9;
  --ink:#12171c; --text-2:#40484f; --text-3:#6b747b; --disabled:#949a9e; --icon:#292e32;
  --navy:#063844; --page:#f0f3f4; --surface:#fff; --grey-1:#f5f8f9; --grey-2:#f0f2f4;
  --border:#d7dce0; --cell:#f0f2f4; --divider:#e3e7ea; --link:#167c7e;
  --success:#00696b; --success-bg:#eaf6f6; --success-bd:#c1e5e6;
  --error:#a5182d; --error-bg:#feebee; --error-bd:#fccfd6;
  --warning:#753b00; --warning-bg:#fff0d6; --warning-bd:#ffd68f;
  --info:#105c70; --info-bg:#e3f7fc; --info-bd:#c7e4eb;
  --green:#00696b; --green-bg:#eaf6f6; --green-bd:#c1e5e6;
  --amber-t:#8a5a00; --amber-bg:#fff4e0; --amber-bd:#ffd68f;
  --red-t:#a5182d; --red-bg:#feebee; --red-bd:#fccfd6;
  --r:8px; --r-btn:8px;
  --sh-1:0 1px 2px rgba(0,0,0,.035),0 1px 3px rgba(0,0,0,.025);
  --sh-6:0 1px 2px rgba(0,0,0,.05),0 5px 16px rgba(0,0,0,.07);
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:Inter,system-ui,Arial,sans-serif;font-weight:500;color:var(--ink);
  background:var(--page);font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased}
a{color:var(--link);text-decoration:none}
h1,h2,h3,h4{margin:0;font-weight:700;color:var(--ink)}
.mono{font-variant-numeric:tabular-nums}
button{font-family:inherit}

/* ===== App shell ===== */
.app{display:flex;min-height:100vh}
.side{width:236px;flex:0 0 236px;background:#fff;border-right:1px solid var(--border);
  position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:14px 0;overflow:auto}
.side .logo{padding:2px 18px 10px;display:flex;align-items:center;gap:8px}
.side .logo .wm{font-weight:800;font-size:18px;color:var(--navy);letter-spacing:-.02em}
.side .lender{margin:2px 12px 12px;padding:9px 11px;border-radius:var(--r);background:var(--brand-100);
  border:1px solid var(--brand-300);cursor:pointer}
.side .lender .k{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--brand-700);font-weight:700}
.side .lender .n{display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:700;font-size:13px;margin-top:2px}
.side .lender .n svg{width:14px;height:14px;color:var(--text-3)}
.side .search{padding:2px 14px 8px}
.side .search .box{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:var(--r);padding:6px 9px}
.side .search svg{width:15px;height:15px;color:var(--text-3);flex:0 0 15px}
.side .search input{border:none;outline:none;font-family:inherit;font-size:12px;width:100%;color:var(--ink);background:none}
.nav{padding:2px 0}
.nav a{display:flex;align-items:center;gap:11px;padding:8px 18px;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer}
.nav a svg{width:17px;height:17px;flex:0 0 17px;color:var(--text-3)}
.nav a:hover{background:var(--grey-1);color:var(--ink)}
.nav a.active{background:var(--brand-100);color:var(--brand-700);font-weight:600;box-shadow:inset 3px 0 0 var(--brand-600)}
.nav a.active svg{color:var(--brand-600)}
.side .foot{margin-top:auto;padding:12px 18px;border-top:1px solid var(--cell);font-size:11px;color:var(--text-3)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{min-height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 24px;position:sticky;top:0;z-index:20}
.crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2)}
.crumbs b{color:var(--ink);font-weight:600}
.crumbs .sep{color:var(--disabled)}
.crumbs .lnk{cursor:pointer}
.crumbs .lnk:hover{color:var(--brand-700)}
.spacer{flex:1}
.proto{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--warning);
  background:var(--warning-bg);border:1px solid var(--warning-bd);border-radius:4px;padding:3px 10px}
.usr{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2)}
.avatar{width:28px;height:28px;border-radius:9999px;background:var(--brand-200);color:var(--brand-700);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.content{padding:20px clamp(18px,1.5vw,30px) 80px;max-width:2600px;width:100%;margin:0 auto}
.mi{--mi-min:230px}
.fcrow{display:flex;gap:16px;align-items:flex-start}
.fcright{flex:1;min-width:0}

/* ===== Primitives ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-1);overflow:hidden}
.card-h{padding:16px 19px;border-bottom:1px solid var(--divider);display:flex;align-items:center;gap:10px}
.card-h h3{font-size:14px}
.card-h .sub{font-size:12px;color:var(--text-3);font-weight:500}
.card-b{padding:19px}
.muted{color:var(--text-3)} .small{font-size:12px}
.lbl{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);font-weight:700}
.btn{font-weight:600;font-size:14px;border-radius:var(--r-btn);border:1px solid transparent;padding:8px 15px;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;line-height:1;white-space:nowrap;appearance:none;-webkit-appearance:none}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--brand-300)}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--brand-600);color:#fff} .btn-primary:hover{background:var(--brand-700)}
.btn-outline{background:#fff;color:var(--ink);border-color:var(--border)} .btn-outline:hover{background:var(--grey-1)}
.btn-sm{padding:5px 10px;font-size:13px}
.chip{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:4px;
  font-size:12px;font-weight:600;border:1px solid transparent;white-space:nowrap}
.chip .dot{width:7px;height:7px;border-radius:9999px;background:currentColor;opacity:.9}
.c-success{background:var(--success-bg);border-color:var(--success-bd);color:var(--success)}
.c-error{background:var(--error-bg);border-color:var(--error-bd);color:var(--error)}
.c-warning{background:var(--warning-bg);border-color:var(--warning-bd);color:var(--warning)}
.c-info{background:var(--info-bg);border-color:var(--info-bd);color:var(--info)}
.c-neutral{background:var(--grey-2);border-color:var(--border);color:var(--text-2)}

/* rating pill A–F */
.rating{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px;
  font-weight:800;font-size:13px}
.rt-A,.rt-B{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.rt-C{background:var(--grey-2);color:var(--text-2);border:1px solid var(--border)}
.rt-D{background:var(--amber-bg);color:var(--amber-t);border:1px solid var(--amber-bd)}
.rt-E,.rt-F{background:var(--red-bg);color:var(--red-t);border:1px solid var(--red-bd)}

/* tables */
table.grid{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
table.grid th{position:sticky;top:0;background:#f9fbfc;text-align:left;font-weight:700;font-size:11px;
  text-transform:uppercase;letter-spacing:.03em;color:var(--text-2);padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;z-index:1}
table.grid td{padding:10px 12px;border-bottom:1px solid var(--cell);vertical-align:middle}
table.grid.flat th{position:static}
table.grid tr.clickable{cursor:pointer}
table.grid tr.clickable:hover td{background:var(--brand-100)}
table.grid td.num,table.grid th.num{text-align:right;font-variant-numeric:tabular-nums}
table.grid tfoot td{font-weight:700;border-top:2px solid var(--border);background:#fbfdfd}
.goarrow{width:26px;height:26px;border-radius:9999px;border:1px solid var(--border);display:inline-flex;
  align-items:center;justify-content:center;color:var(--brand-700);background:#fff}
tr.clickable:hover .goarrow{background:var(--brand-600);color:#fff;border-color:var(--brand-600)}

/* MI strip */
.mi{display:grid;grid-template-columns:1fr 1fr 1fr 1.15fr;gap:14px;margin-bottom:18px}
.mi .card{display:flex}
.mi .card-b{padding:18px 20px;flex:1;display:flex;flex-direction:column;justify-content:flex-start}
.mi .k{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:700}
.mi .v{font-size:25px;font-weight:800;letter-spacing:-.02em;margin-top:6px}
.mi .s{font-size:12px;color:var(--text-3);margin-top:4px}
/* donut card (Ravi style: title top-left · centered donut w/ total) */
.mi .donutcard{align-items:stretch}
.donutcard .k{align-self:flex-start}
.donut-c{align-self:center;margin:auto 0;position:relative;width:104px;height:104px}
.donut-c svg{display:block}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center .dc-v{font-size:16px;font-weight:800;letter-spacing:-.02em;color:var(--ink);line-height:1}
.donut-center .dc-l{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:700;margin-top:2px}
.dseg{transition:opacity .12s;cursor:pointer}
/* hover breakdown popover (Ravi style) */
.mi .card.donutwrap{overflow:visible;position:relative}
.donut-pop{position:absolute;top:calc(100% + 8px);right:0;width:390px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 14px 44px rgba(6,56,68,.18);padding:16px 18px;opacity:0;visibility:hidden;transform:translateY(-4px);transition:opacity .15s,transform .15s,visibility .15s;z-index:60}
.donutwrap:hover .donut-pop{opacity:1;visibility:visible;transform:none}
.dp-title{font-weight:800;font-size:14px;color:var(--ink);margin-bottom:11px}
.dp-table{width:100%;border-collapse:collapse;font-size:12.5px}
.dp-table th{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-3);font-weight:700;padding:0 0 8px;text-align:left}
.dp-table td{padding:6px 0;border-top:1px solid var(--cell);text-align:left}
.dp-table .n{text-align:right;font-variant-numeric:tabular-nums}
.dp-table td:first-child{font-weight:700;color:var(--ink)}
.dp-table td.b{font-weight:700}
.dp-table .rdot{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:8px;vertical-align:middle}
.dp-table tfoot td{border-top:1px solid var(--border);font-weight:800;padding-top:9px;color:var(--ink)}
/* MI cards with sparklines (Piotr style) */
.mi{grid-template-columns:1.45fr 1fr 1fr 1fr}
.mi-card .card-b{display:flex;flex-direction:column}
.mi-card .v{color:var(--brand-700)}
.mi-spark{margin:11px 0 8px}
.mi-sub{font-size:12px;color:var(--text-3)}
.mi-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--cell);padding-top:11px;margin-top:auto;font-size:12px;color:var(--text-3)}
.mi-foot b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
.mi-donut .card-b{display:flex;flex-direction:column}
.donut-row{display:flex;align-items:center;gap:18px;margin:10px 0 4px;flex:1}
.donut-legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:0}
.dl-row{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:9px;font-size:12px}
.dl-dot{width:9px;height:9px;border-radius:3px}
.dl-k{color:var(--text-2);font-weight:600} .dl-v{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
.dl-p{color:var(--text-3);width:36px;text-align:right;font-variant-numeric:tabular-nums}
/* filter bar */
.pf-bar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.pf-tabs{display:flex;gap:8px;flex-wrap:wrap}
.pf-tab{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:#fff;border-radius:9px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;transition:background .12s,color .12s,border-color .12s}
.pf-tab:hover{background:var(--grey-1)}
.pf-tab.on{background:var(--brand-700);border-color:var(--brand-700);color:#fff}
.pf-tab .cnt{font-size:11.5px;font-weight:800;background:var(--grey-1);color:var(--text-2);border-radius:20px;padding:1px 8px}
.pf-tab.on .cnt{background:rgba(255,255,255,.22);color:#fff}
.pf-search{position:relative;margin-left:auto}
.pf-search input{border:1px solid var(--border);border-radius:9px;padding:9px 12px 9px 34px;font-family:inherit;font-size:13px;width:230px;color:var(--ink);background:#fff}
.pf-search input:focus{outline:none;border-color:var(--brand-400)}
.pf-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-3)}
/* deals table extras */
.org-cell{display:flex;align-items:center;gap:11px}
.orglogo{width:30px;height:30px;border-radius:7px;flex:0 0 30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:#fff;overflow:hidden}
.orglogo.shop{background:#95bf47;border-color:#7fa83c}
.ptag{display:inline-block;font-size:11.5px;font-weight:600;color:var(--text-2);background:var(--grey-1);border:1px solid var(--border);border-radius:5px;padding:2px 9px;margin:1px 3px 1px 0;white-space:nowrap}
.uwcell{display:flex;align-items:center;gap:10px}
.uwbar{flex:1;height:6px;border-radius:4px;background:var(--cell);overflow:hidden;min-width:52px;max-width:100px}
.uwbar-fill{height:100%;border-radius:4px}
.uwdays{font-variant-numeric:tabular-nums;font-weight:700;font-size:12.5px}

/* deal header sticky */
.dealhead{position:sticky;top:56px;z-index:15;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--sh-1);padding:13px 16px;margin-bottom:0}
.dealhead .top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dealhead .org{font-size:18px;font-weight:800;letter-spacing:-.01em}
.dh-facts{display:flex;gap:22px;flex-wrap:wrap;margin-left:auto}
.dh-facts .f .k{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:700}
.dh-facts .f .v{font-size:14px;font-weight:700;margin-top:1px}

/* tabs */
.tabs{position:sticky;top:calc(56px);z-index:14;display:flex;gap:2px;background:var(--page);
  border-bottom:1px solid var(--border);margin-top:14px;padding-top:6px}
.tabs .t{padding:9px 15px;font-weight:600;font-size:13.5px;color:var(--text-2);cursor:pointer;
  border-bottom:2px solid transparent;text-transform:none}
.tabs .t:hover{color:var(--ink)}
.tabs .t.on{color:var(--brand-700);border-bottom-color:var(--brand-600)}
.tabpane{padding-top:18px}
.tabpane[hidden]{display:none}

/* notes dock */
.notes{position:fixed;right:22px;bottom:0;width:340px;z-index:40;background:#fff;border:1px solid var(--border);
  border-bottom:none;border-radius:8px 8px 0 0;box-shadow:var(--sh-6)}
.notes .nh{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--navy);color:#fff;
  border-radius:8px 8px 0 0;cursor:pointer;font-weight:700;font-size:13px}
.notes .nh .sp{flex:1} .notes .nh svg{width:15px;height:15px;opacity:.85}
.notes .nb{padding:11px 13px}
.notes textarea{width:100%;min-height:120px;border:1px solid var(--border);border-radius:var(--r);padding:9px;
  font-family:inherit;font-size:13px;resize:vertical;color:var(--ink)}
.notes.min .nb{display:none}
.notes .save{font-size:11px;color:var(--text-3);margin-top:6px}

/* misc */
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:14px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
.trends-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1100px){.trends-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.trends-grid{grid-template-columns:1fr}}
.concbar{display:flex;height:14px;border-radius:7px;overflow:hidden;background:var(--grey-2)}
.concbar span{display:block;height:100%}
.gal-ai{display:flex;gap:12px;align-items:flex-start;margin-top:14px;padding:14px 16px;background:linear-gradient(180deg,#f5f3ff,#faf9ff);border:1px solid #e6e0ff;border-radius:10px}
.gal-ai .ais-badge{margin-left:0;flex:0 0 auto}
.gal-ai-tx{font-size:13px;line-height:1.55;color:var(--text-2)}
.gal-ai-h{font-weight:800;color:#6d4bd6;text-transform:uppercase;letter-spacing:.04em;font-size:11px;margin-right:6px}
.kv{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:13px}
.kv dt{color:var(--text-3);font-weight:600} .kv dd{margin:0;font-weight:600}
.checkrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--cell);font-size:13px}
.checkrow:last-child{border-bottom:none}
.checkrow .st{width:78px;flex:0 0 78px}
.checkrow .nm{font-weight:600} .checkrow .dt{color:var(--text-3);margin-left:auto;font-size:12px;text-align:right}
.dotg{color:var(--green)} .dota{color:var(--amber-t)} .dotr{color:var(--red-t)}
.stub{border:1px dashed var(--border);border-radius:var(--r);padding:30px;text-align:center;color:var(--text-3);background:#fff}
.stub b{color:var(--text-2)}
.warnlab{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--warning);
  background:var(--warning-bg);border:1px solid var(--warning-bd);border-radius:4px;padding:2px 8px}
.thumbs{display:flex;gap:8px} .thumb{width:52px;height:52px;border-radius:var(--r);border:1px solid var(--border);
  background:var(--grey-1);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:10px;text-align:center}

/* accordion (RAG) */
.acc .arow{border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;background:#fff}
.acc .ahead{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer}
.acc .arow.g .ahead{background:var(--green-bg)} .acc .arow.a .ahead{background:var(--amber-bg)} .acc .arow.r .ahead{background:var(--red-bg)}
.acc .aname{font-weight:700;font-size:14px;min-width:190px}
.acc .adetail{color:var(--text-2);font-size:13px;flex:1}
.acc .acaret{transition:transform .15s} .acc .arow.open .acaret{transform:rotate(180deg)}
.acc .abody{padding:14px;border-top:1px solid var(--cell);display:none}
.acc .arow.open .abody{display:block}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:#fff}
.seg button{border:none;background:#fff;padding:4px 9px;font-weight:700;font-size:12px;cursor:pointer;color:var(--text-3)}
.seg button.on.g{background:var(--green);color:#fff} .seg button.on.a{background:var(--amber-t);color:#fff} .seg button.on.r{background:var(--red-t);color:#fff}

/* scorecards strip */
.scstrip{display:grid;grid-template-columns:repeat(6,1fr);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.scstrip .sc{padding:12px;text-align:center;border-right:1px solid var(--cell)}
.scstrip .sc:last-child{border-right:none}
.scstrip .g{font-size:22px;font-weight:800;padding:6px 0;border-radius:var(--r);margin-bottom:6px}
.scstrip .lab{font-size:12px;color:var(--text-2);font-weight:600}

/* forecast controls + P&L */
.ctlbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.scen{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.scen button{border:none;background:#fff;padding:7px 14px;font-weight:600;font-size:13px;cursor:pointer;color:var(--text-2)}
.scen button.on{background:var(--brand-600);color:#fff}
.pl{width:100%;border-collapse:collapse;font-size:13px}
.pl td{padding:5px 12px;border-bottom:1px solid var(--cell)}
.pl td.num{text-align:right;font-variant-numeric:tabular-nums}
.pl tr.hd td{font-weight:800;background:var(--grey-1);text-transform:uppercase;font-size:11px;letter-spacing:.03em;color:var(--text-2)}
.pl tr.sub td{color:var(--text-3);font-size:12px;padding-top:1px;padding-bottom:6px}
.pl tr.tot td{font-weight:700;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.fcpl .pl td{padding:9px 18px;font-size:11.5px}
.fcpl .pl td.num{white-space:nowrap}
.fcpl .pl td:first-child{white-space:nowrap;padding-right:8px}
.fcpl .pl tr.hd td,.fcpl .pl tr.sub td{font-size:10.5px}
.fcpl .card-b{padding:8px 4px!important}
.pl tr.ext td{background:var(--grey-1)}
.pl tr.ext td:first-child{color:var(--text-1)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(6,20,24,.45);z-index:60;display:flex;align-items:center;justify-content:center;padding:30px}
.modal{background:#fff;border-radius:8px;box-shadow:var(--sh-6);max-width:1080px;width:100%;max-height:88vh;display:flex;flex-direction:column}
.modal .mh{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal .mh h3{font-size:15px}
.modal .mb{padding:16px 18px;overflow:auto}
.modal .x{margin-left:auto;cursor:pointer;color:var(--text-3);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);font-size:15px}
.modal .x:hover{background:var(--grey-1)}
.editcell{width:78px;text-align:right;border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-family:inherit;font-size:12px;font-variant-numeric:tabular-nums}
.editcell.chg{background:var(--warning-bg);border-color:var(--warning-bd);font-weight:700;color:var(--warning)}
.rocell{color:var(--text-3);font-variant-numeric:tabular-nums}
/* chart gallery (expanded) */
.galbody{padding:0!important}
.galstage{display:flex;align-items:center;gap:8px;padding:14px 14px 6px}
.galmain{flex:1;min-width:0}
.galnav{flex:0 0 40px;height:40px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink)}
.galnav:hover:not(:disabled){background:var(--brand-100);border-color:var(--brand-300);color:var(--brand-700)}
.galnav:disabled{opacity:.3;cursor:default}
.galnav svg{width:20px;height:20px}
.galthumbs{display:flex;gap:8px;overflow-x:auto;padding:10px 14px 14px;border-top:1px solid var(--cell);background:var(--grey-1);border-radius:0 0 8px 8px}
.galthumb{flex:0 0 168px;border:1px solid var(--border);border-radius:8px;background:#fff;padding:7px 9px 4px;cursor:pointer;text-align:left}
.galthumb:hover{border-color:var(--brand-300)}
.galthumb.on{border-color:var(--brand-600);box-shadow:inset 0 0 0 1px var(--brand-600)}
.galthumb .gtlab{font-size:10px;font-weight:700;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}

/* expand-a-chart + toast */
.bigchart svg{height:340px!important;width:100%}
.minic:hover{box-shadow:0 0 0 1px var(--brand-300)!important}
/* full-width expandable chart (e.g. Existing Uncapped balance) — the mini card fills the card body */
.wide-mini{width:100%}
.wide-mini .minic{width:100%}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
  padding:11px 18px;border-radius:8px;box-shadow:var(--sh-6);z-index:80;font-weight:600;font-size:13px}
/* categorisation */
.subtabs{display:flex;gap:18px;border-bottom:1px solid var(--border);margin-bottom:14px}
.subtabs .st{padding:8px 2px;font-weight:600;font-size:13px;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent}
.subtabs .st.on{color:var(--brand-700);border-bottom-color:var(--brand-600)}
.catbtns{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.catbtn{border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;background:#fff;text-align:left;cursor:pointer;font-family:inherit}
.catbtn:hover{border-color:var(--brand-300);background:var(--brand-100)}
.catbtn.on{border-color:var(--brand-600);box-shadow:inset 0 0 0 1px var(--brand-600)}
.catbtn .k{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:700}
.catbtn .v{font-size:22px;font-weight:800;margin-top:4px}
.catbtn .s{font-size:12px;color:var(--text-3);margin-top:2px}
.txsel{font-family:inherit;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:3px 6px;background:#fff}
.conf{display:inline-block;min-width:38px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.conf.lo{color:var(--red-t)} .conf.mid{color:var(--amber-t)} .conf.hi{color:var(--text-3)}
table.grid tr.flagged td{background:var(--warning-bg)}
/* Transactions header + toggle + compact grid */
.txhead{display:flex;align-items:flex-start;gap:14px;padding:18px 20px;border-bottom:1px solid var(--border)}
.txhead .txtitle{font-weight:800;font-size:15px;color:var(--ink)}
.txhead .txcount{font-weight:600;color:var(--text-3);font-size:13px}
.txhead .txsub{font-size:12px;color:var(--text-3);margin-top:2px}
.txactions{margin-left:auto;display:flex;align-items:center;gap:14px;flex-shrink:0}
.toggle{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-2);cursor:pointer;user-select:none;white-space:nowrap}
.toggle input{position:absolute;opacity:0;width:0;height:0}
.toggle .sw{width:34px;height:19px;border-radius:19px;background:#cfd8dc;position:relative;transition:background .15s;flex:0 0 34px}
.toggle .sw::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle input:checked + .sw{background:var(--brand-600)}
.toggle input:checked + .sw::after{transform:translateX(15px)}
table.grid.compact th{padding:8px 12px}
table.grid.compact td{padding:5px 12px}
table.grid td.nowrap,table.grid th.nowrap{white-space:nowrap}
/* fixed column widths so nothing shifts when the flagged toggle filters rows */
table.txgrid{table-layout:fixed;min-width:860px}
table.txgrid td,table.txgrid th{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
table.txgrid tbody tr{transition:background .12s}
table.txgrid tbody tr:hover td{background:var(--brand-100)}
table.txgrid tbody tr.flagged:hover td{background:#fff4e0}
.txsel{width:100%;max-width:100%}
.autosave{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-3);white-space:nowrap}
.autosave svg{width:13px;height:13px;color:var(--success)}
.autosave.saving{color:var(--brand-700)}
.autosave.saving svg{color:var(--brand-600)}
/* Monthly cash-based P&L (Ravi structure) */
.pl-head{display:flex;align-items:center;gap:9px;font-weight:800;font-size:14px;color:var(--ink);padding:18px 20px;border-bottom:1px solid var(--border)}
.pl-ic{width:26px;height:26px;border-radius:6px;background:var(--grey-1);display:flex;align-items:center;justify-content:center;color:var(--text-2);flex:0 0 26px}
.pl-ic svg{width:15px;height:15px}
.plt{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
.plt th{text-align:right;font-weight:700;font-size:11px;color:var(--text-2);padding:11px 16px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.plt th:first-child{text-align:left;color:var(--text-3);font-weight:600;text-transform:none}
.plt td{padding:6.5px 16px;border-bottom:1px solid var(--cell);color:var(--ink);white-space:nowrap}
.plt td.n{text-align:right}
.plt td.neg{color:var(--red-t)}
.plt tbody tr:not(.sec):not(.pct):hover td{background:var(--brand-100)}
.plt tr.sec td{background:var(--grey-1);font-weight:800;font-size:12px;color:var(--ink);border-bottom:none;padding:8px 16px}
.plt tr.tot td{font-weight:700;border-top:1px solid var(--border)}
.plt tr.net td{border-top:2px solid var(--border);font-weight:800;font-size:13px}
.plt tr.pct td{font-style:italic;color:var(--text-3);font-size:11.5px;padding-top:1px;padding-bottom:7px}
/* Background / due-diligence */
.linkrow{display:grid;grid-template-columns:1.4fr 1fr auto;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid var(--cell)}
.linkrow:last-child{border-bottom:none}
.linkrow .lo-n{font-weight:700;font-size:13px}
.linkrow .lo-id{font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums}
.linkrow .lo-rel{font-size:12px;color:var(--text-2)}
.linkrow .lo-exp{font-size:12px;text-align:right}
.bg-clean{display:flex;align-items:center;gap:9px;padding:16px;color:var(--text-2);font-size:13px}

/* crisp, consistent icon rendering (chrome only — not charts) */
.side svg,.topbar svg,.crumbs svg,.btn svg,.goarrow svg,.notes svg,.warnlab svg,.proto svg,.accaret{
  stroke-linecap:round;stroke-linejoin:round}

/* ===== large-screen + reflow ===== */
@media(max-width:1200px){
  .fcrow{flex-direction:column}
  .fcpl{position:static!important;flex:0 0 auto!important;width:100%}
}
@media(max-width:1000px){.mi{grid-template-columns:1fr 1fr}.dh-facts{margin-left:0}}
@media(max-width:640px){.mi{grid-template-columns:1fr}.catbtns{grid-template-columns:1fr}}

/* ===== Ravi sidebar nav ===== */
.side .logo svg{height:22px;width:auto;display:block}
.side .navgrp{padding:2px 0}
.side .navgrp .ni{display:flex;align-items:center;gap:10px;padding:8px 16px;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;width:100%;border:none;background:none;font-family:inherit;text-align:left}
.side .navgrp .ni:hover{background:var(--grey-1);color:var(--ink)}
.side .navgrp .ni.active{background:var(--brand-100);color:var(--brand-700);font-weight:600;box-shadow:inset 3px 0 0 var(--brand-600)}
.side .navgrp .ni svg{width:17px;height:17px;flex:0 0 17px;color:var(--text-3);stroke-linecap:round;stroke-linejoin:round}
.side .navgrp .ni.active svg{color:var(--brand-600)}
.side .orgcard{margin:8px 12px 4px;padding:9px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--grey-1)}
.side .orgcard .on{font-weight:700;font-size:13px}
.side .orgcard .oi{font-size:11px;color:var(--text-3)}
.side .grp-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;padding:8px 16px 2px}
.side .profile{display:flex;align-items:center;gap:9px;padding:11px 16px;border-top:1px solid var(--cell)}
.side .profile .pn{font-weight:700;font-size:13px;line-height:1.2}.side .profile .pr{font-size:11px;color:var(--text-3)}

/* ===== deal workspace: snapshot + verdict ===== */
.snap{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-1);padding:17px 22px;margin-bottom:14px}
.snap-top{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.snap-id{display:flex;gap:13px;align-items:center}
.org-logo{width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 54px}
.org-logo svg{width:100%;height:100%;display:block}
.snap-h{font-size:16px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.snap-h .rating{width:22px;height:22px;font-size:12px;border-radius:4px}
.snap-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:7px}
.snap-meta .stag{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--text-2);background:#fff;border:1px solid var(--border);border-radius:4px;padding:2px 7px}
.snap-meta .stag.mono{color:var(--text-3)}
.snap-meta .mid{width:3px;height:3px;border-radius:50%;background:var(--disabled)}
.snap-meta .lock{display:inline-flex;align-items:center;gap:5px;color:var(--text-3)}
.snap-meta .lock svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
.snap-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.verdict{display:grid;grid-template-columns:repeat(5,1fr);margin:14px -22px -17px;padding:0 22px;background:var(--grey-1);border-top:1px solid var(--border);border-radius:0 0 var(--r) var(--r)}
@media(max-width:1000px){.verdict{grid-template-columns:repeat(3,1fr)}}
.verdict .vc{display:flex;flex-direction:column;justify-content:center;gap:5px;padding:16px 22px;border-right:1px solid var(--border)}
.verdict .vc:first-child{padding-left:0}
/* Decision strip: full-height dividers (no top/bottom gap) + tighter height */
.dec-strip .card-b{padding-top:0;padding-bottom:0}
.dec-strip .verdict .vc{padding-top:13px;padding-bottom:13px}
/* publish-decision confirmation modal */
.pub-sum{background:var(--grey-1);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:16px}
.pub-sum-v{font-weight:700;font-size:15px;margin-top:6px;display:flex;align-items:center;gap:9px}
.pub-lbl{display:block;font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:6px}
.pub-lbl .req{color:var(--error);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.04em;margin-left:5px}
.pub-err{color:var(--error);font-size:12.5px;font-weight:600;margin-top:9px}
.verdict .vc:last-child{border-right:none;padding-right:0}
.verdict .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.verdict .val{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.rag-dot{width:11px;height:11px;border-radius:50%}
.rag-dot.g{background:#2fb35a}.rag-dot.a{background:#f4a41f}.rag-dot.r{background:#e0473f}
.exc-num{font-size:18px;font-weight:800;color:var(--warning)}

/* spine (steps at top) */
/* ===== step spine: clean flat tabs — grey default, teal active underline on the card line ===== */
.spine{display:flex;justify-content:flex-start;align-items:center;background:#fff;border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--sh-1);padding:12px;margin-bottom:16px;overflow-x:auto;position:sticky;top:56px;z-index:12;
  transition:padding .16s ease,border-radius .16s ease,box-shadow .16s ease,margin .16s ease}
/* on scroll: condense into a flat, full-width toolbar flush under the header */
.spine.stuck{border-radius:0;border-left:none;border-right:none;border-top:none;border-bottom:1px solid var(--border);
  margin-left:calc(-1*clamp(18px,1.5vw,30px));margin-right:calc(-1*clamp(18px,1.5vw,30px));
  padding:12px clamp(18px,1.5vw,30px);box-shadow:0 4px 12px rgba(6,56,68,.05)}
.sline{flex:1 1 auto;min-width:8px;height:2.5px;align-self:center;margin:0 6px;border-radius:2px;background:#d5dde0}
.sline.done{background:var(--brand-300)}
.sstep{position:relative;flex:0 0 auto;display:flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;
  padding:9px 9px;border-radius:9px;white-space:nowrap;color:var(--text-2);font-family:inherit;transition:color .12s,background .12s}
.sstep:hover{color:var(--ink)}
.sstep .slabel{font-size:13px;font-weight:600;letter-spacing:-.01em}
.sstep.cur{color:var(--brand-700);background:var(--brand-100)}   /* active = subtle highlight pill, no underline */
/* small numbered status marker, left of the label */
.snum{width:15px;height:15px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex:0 0 15px;letter-spacing:-.02em}
.snum svg{width:10px;height:10px}
.snum.clean{background:transparent} /* dotted grey ring icon */
.snum.clean svg{width:16px;height:16px}
.snum.red{background:var(--error-bg);color:var(--error)} /* light red bg, bright red font */
.snum.done{background:var(--brand-600);color:#fff}
/* review-progress ring in the verdict bar */
.prog-val{display:flex;align-items:center;gap:8px}
.pring{flex:0 0 20px}
/* per-step "mark as reviewed" confirm bar */
.confirm-bar{position:sticky;bottom:0;z-index:11;display:flex;align-items:center;gap:12px;margin:20px calc(-1*clamp(18px,1.5vw,30px)) -80px;padding:9px clamp(18px,1.5vw,30px);background:#fff;border:none;border-top:1px solid var(--border);border-radius:0;box-shadow:0 -3px 12px rgba(6,56,68,.06)}
.confirm-bar .btn{padding:9px 20px;font-size:13.5px}
.confirm-bar.done{background:var(--brand-100);border-top-color:var(--brand-300);box-shadow:0 -3px 12px rgba(18,128,129,.07)}
.confirm-bar .cb-msg{font-weight:600;color:var(--ink);font-size:13.5px}
.confirm-bar .cb-sub{color:var(--text-3);font-size:12.5px;margin-left:2px}
.confirm-bar .cb-done{display:inline-flex;align-items:center;gap:7px;font-weight:700;color:var(--brand-700);font-size:13.5px}
.confirm-bar .cb-done svg{width:16px;height:16px}
.confirm-bar .cb-act{margin-left:auto;display:flex;gap:8px}
/* scroll-to + highlight when you jump to an issue from Review / checks table */
.focus-flash{animation:focusflash 2.2s ease}
@keyframes focusflash{0%,18%{box-shadow:0 0 0 3px var(--brand-300);background:var(--brand-100)}100%{box-shadow:0 0 0 0 rgba(0,0,0,0);background:transparent}}

/* work grid + right rail (tabbed) */
.work{display:grid;grid-template-columns:minmax(0,1fr);gap:16px;align-items:start}
.work.railopen{grid-template-columns:minmax(0,1fr) 330px}
.step-host{min-width:0}
.rail{position:sticky;top:112px;max-height:calc(100vh - 128px);display:none;flex-direction:column}
.work.railopen .rail{display:flex}
.rail-x{margin-left:auto;border:none;background:none;color:var(--text-3);cursor:pointer;font-size:13px;padding:0 8px;align-self:center}
/* collapsed handle (right edge) */
.rail-handle{position:fixed;right:0;top:150px;z-index:30;display:flex;align-items:center;gap:7px;background:var(--navy);color:#fff;border:none;border-radius:20px 0 0 20px;padding:10px 16px 10px 14px;box-shadow:-3px 3px 14px rgba(6,56,68,.22);cursor:pointer;font-family:inherit;font-weight:700;font-size:12.5px}
.rail-handle b{background:rgba(255,255,255,.22);border-radius:20px;padding:0 7px;font-size:11.5px}
/* floating Notes composer */
.note-fab{position:fixed;right:22px;bottom:104px;z-index:30;display:flex;align-items:center;gap:7px;background:var(--brand-700);color:#fff;border:none;border-radius:22px;padding:10px 16px;box-shadow:0 6px 18px rgba(6,56,68,.2);cursor:grab;font-family:inherit;font-weight:700;font-size:13px;touch-action:none;user-select:none}
.note-fab.dragging{cursor:grabbing;opacity:.94}
.note-fab .fab-grip{opacity:.5;margin-right:-2px}
.note-fab:hover{background:var(--brand-600)}
.note-fab b{background:rgba(255,255,255,.22);border-radius:4px;padding:0 7px;font-size:11.5px}
/* movable / resizable / minimisable underwriter-notes window */
.notewin{position:fixed;right:22px;bottom:158px;z-index:40;width:330px;height:440px;min-width:280px;min-height:170px;max-width:92vw;max-height:82vh;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 18px 50px rgba(6,56,68,.26);display:flex;flex-direction:column;overflow:hidden;resize:both}
.notewin[hidden]{display:none}
.notewin.min{height:auto!important;min-height:0;resize:none}
.notewin.min .nw-body{display:none}
.nw-head{display:flex;align-items:center;background:var(--navy);color:#fff;padding:10px 12px 10px 14px;cursor:move;user-select:none;flex:0 0 auto}
.nw-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px}
.nw-title svg{width:16px;height:16px}
.nw-actions{margin-left:auto;display:flex;gap:2px}
.nw-min,.nw-x{border:none;background:none;color:#fff;cursor:pointer;font-size:16px;width:26px;height:26px;border-radius:6px;line-height:1;display:flex;align-items:center;justify-content:center}
.nw-min:hover,.nw-x:hover{background:rgba(255,255,255,.16)}
.nw-body{flex:1 1 auto;min-height:0;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:13px}
.nw-list{display:flex;flex-direction:column;gap:10px}
.nw-note{border:1px solid var(--border);border-radius:9px;padding:11px 12px;cursor:pointer;background:var(--grey-1);transition:border-color .12s,background .12s}
.nw-note:hover{border-color:var(--brand-300);background:#fff}
.nw-tag{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--brand-700);background:var(--brand-100);border:1px solid var(--brand-300);padding:2px 8px;border-radius:4px;margin-bottom:7px}
.nw-who{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-3);margin-bottom:4px}

/* Decision offers as rows */
.offer-table{width:100%;border-collapse:collapse;font-size:13px}
.offer-table th{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-3);font-weight:700;text-align:left;padding:11px 16px;border-bottom:1px solid var(--divider)}
.offer-table td{padding:14px 16px;border-top:1px solid var(--cell);vertical-align:middle}
.offer-table tbody tr:first-child td{border-top:none}
.offer-row.approve td:first-child{box-shadow:inset 3px 0 0 var(--success)}
.offer-row.approve{background:var(--success-bg)}
.offer-row.reject{opacity:.72}
.or-name{font-weight:700;color:var(--ink);margin-right:8px}
.or-amt{font-weight:800;color:var(--ink);white-space:nowrap}
.or-terms{color:var(--text-2);font-size:12px;line-height:1.5}

.or-terms .ot-sep{margin:0 7px;color:var(--disabled)}
.or-act{white-space:nowrap;text-align:right}
.or-act .btn{margin-left:6px}
.offer-card{border:1px solid var(--border);border-radius:var(--r);background:#fff;padding:19px 20px;box-shadow:var(--sh-1)}
.offer-card.ok{box-shadow:inset 3px 0 0 var(--success),var(--sh-1);border-color:var(--success-bd)}
.offer-card.rej{box-shadow:inset 3px 0 0 var(--error),var(--sh-1);border-color:var(--error-bd);opacity:.9}
.oc-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:11px}
.oc-t{font-weight:800;font-size:15px}
.oc-rec,.oc-avail{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:2px 7px;border-radius:4px;margin-left:7px;vertical-align:2px}
.oc-rec{color:var(--brand-700);background:var(--brand-100);border:1px solid var(--brand-300)}
.oc-avail{color:var(--text-3);background:var(--grey-1);border:1px solid var(--border)}
.oc-term{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--cell);font-size:13px}
.oc-term:last-child{border-bottom:none}
.oc-term .ot-k{color:var(--text-3)} .oc-term .ot-v{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.oc-actions{display:flex;align-items:center;gap:8px;margin-top:13px}
.oc-rejbtn.on{border-color:var(--error);color:var(--error);background:var(--error-bg)}
.about .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
/* AI branding + AI web-search card */
.ai-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;letter-spacing:.03em;color:#fff;
  padding:2px 8px 2px 6px;border-radius:20px;background:linear-gradient(100deg,#7c5cff,#b06cff);vertical-align:middle}
.ai-badge svg{width:11px;height:11px}
.aiweb .card-h{display:flex;align-items:center;gap:9px}

.aiweb .ws-sum{margin:0;color:var(--text-2);font-size:13px;line-height:1.55}
.aiweb .ws-flag{display:flex;gap:11px;border-left:4px solid #e0a400;background:#fff8e6;border-radius:0 8px 8px 0;
  padding:10px 14px;margin-top:11px}
.aiweb .ws-flag .wf-t{font-weight:800;font-size:12.5px;color:#8a5a00}
.aiweb .ws-flag .wf-d{font-size:12.5px;color:var(--text-2);margin-top:2px;line-height:1.5}
.aiweb .ws-flag .wf-src{font-size:11px;color:var(--text-3);margin-top:4px}
.aiweb .ws-clear{display:inline-flex;align-items:center;gap:6px;margin-top:11px;font-size:12.5px;color:var(--success)}
.aiweb .ws-vectors{margin-top:13px;font-size:11.5px;color:var(--text-3)}
.aiweb .ws-more{margin-left:8px;color:var(--brand-700);font-weight:700;text-decoration:none}
/* About-card header: title + AI badge + tags on one line (no repeated sub-label) */
.about-h{flex-wrap:wrap;gap:10px}
.about-h .about-chips{display:flex;flex-wrap:wrap;gap:6px;margin-left:auto}
.about-h .about-chips .chip{height:24px}
/* compact adverse-media line on the Overview (detail lives in Background) */
.ws-brief{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;padding:9px 13px;border-radius:8px;font-size:13px}
.ws-brief.flag{background:#fff8e6;border-left:4px solid #e0a400}
.ws-brief.clear{background:var(--grey-1);border-left:4px solid var(--success)}
.ws-brief .wb-t{color:var(--text-2)}
.ws-brief .wb-t b{color:var(--ink);font-weight:700}
.ws-brief .ws-more{margin-left:auto;color:var(--brand-700);font-weight:700;text-decoration:none;white-space:nowrap}
.linkitem{display:flex;align-items:center;gap:11px;border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:8px;background:#fff;text-decoration:none;color:var(--ink)}
.linkitem:hover{border-color:var(--brand-300);background:var(--brand-100)}
.linkitem:last-child{margin-bottom:0}
.linkitem.flag{border-color:#f0dcae;background:#fdf8ee}
.linkitem.flag:hover{background:#fdf3df}
.linkitem{min-height:58px}
.linkitem .li-ic{width:40px;height:40px;flex:0 0 40px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--grey-1);color:var(--text-2)}
.linkitem .li-t{font-weight:700;font-size:13px;line-height:1.25}
.linkitem .li-s{font-size:11.5px;color:var(--text-3);margin-top:1px}
.linkitem .li-open{margin-left:auto;color:var(--link);font-weight:600;font-size:12px;white-space:nowrap;flex:0 0 auto}

.pitem{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--cell)}
.pitem:last-child{border-bottom:none}
.pitem .pimg2{width:46px;height:46px;flex:0 0 46px;border-radius:8px;border:1px solid var(--border);object-fit:cover;background:var(--grey-1)}
.pitem .p-n{font-weight:700;font-size:13px}
.pitem .p-p{font-size:12px;color:var(--text-3);margin-top:1px}

/* Deal at a glance tiles — separate clickable cards */
.glance{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:1100px){.glance{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.glance{grid-template-columns:repeat(2,1fr)}}
.gtile{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-1);padding:18px 19px;
  cursor:pointer;text-align:left;font-family:inherit;transition:border-color .12s,box-shadow .12s}
.gtile:hover{border-color:var(--brand-300);box-shadow:var(--sh-6)}
.gtile .gtop{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gtile .gk{font-size:11px;color:var(--text-3);font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtile .gtop svg{flex:0 0 auto}
.gt-ic{flex:0 0 auto;display:inline-flex;color:var(--brand-600)}
.gt-ic svg{width:17px;height:17px}
.gt-ic.up,.gt-ic.mut{color:var(--brand-600)}   /* green = brand primary */
.gt-ic.warn{color:#f59e0b}                       /* bright amber-500 */
.gt-ic.down{color:#ef4444}                       /* bright red-500 */

.glance-in{margin-bottom:0}
.glance-in .gtile{box-shadow:none;background:#fff;border-color:var(--border)}
.glance-in .gtile:hover{border-color:var(--brand-300)}

.rec-head{display:flex;align-items:center;gap:10px;margin-bottom:15px}

.rec-head h3,.snap-head h3{margin:0;font-size:14px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.snap-head{gap:10px}
.rec-card .card-b{padding:0}
.rec-grid{display:grid;grid-template-columns:0.82fr 2.3fr;align-items:stretch}
.rec-left{border-right:1px solid var(--divider);padding:19px 24px 19px 19px}

.rec-right{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:19px 19px 19px 24px}
.rec-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:8px}

.rec-box.neg{background:var(--red-bg);border-color:var(--red-bd)}

.rec-box-h.pos{color:var(--green)} .rec-box-h.neg{color:var(--red-t)}

.sd-p{margin:0;font-size:12.5px;line-height:1.55;color:var(--text-2)}

function donut(segments, size=92, thick=17){

    const len=C*s.v/total; const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${thick}" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`; off+=len; return el;

}

function glanceTiles(d){
  const rr=(d.realRev||[]).filter(x=>typeof x==='number');
  const rev12 = rr.length? rr.slice(-12).reduce((s,x)=>s+x,0) : d.preoffer*5;
  const rev3  = rr.length? rr.slice(-3).reduce((s,x)=>s+x,0)  : Math.round(rev12/4);
  const cash=Math.round(rr.length? rev12*0.06 : d.preoffer*0.34);
  const inv=Math.round(rr.length? rev12*0.14 : d.preoffer*0.72);
  const debt=(d.debt_total!=null)? d.debt_total : debtLoans(d).reduce((s,l)=>s+l[2],0);
  const nf=(d.debt_count!=null)? d.debt_count : debtLoans(d).length;
  const invCap=d.inv_cover? (d.inv_cover+' months of cover') : (d.source==='Amazon'?'62 days of cover':'—');
  const score={A:88,B:74,C:58,D:46,E:34,F:22}[d.rating]||60, up=d.revTrend==='up', down=d.revTrend==='down';

// Real backing-chart sets per RAG area — mapped from the Amazon Model 2.0 tabs (Model / Debt Summary / Account Status / Inventory / Revenue by Source)
function ragCharts(d,name,i){

  const trendW=up?'trending up with healthy momentum':down?'softening — the forward view keeps declining':'broadly flat';

  const S=(seed,n,base,vol,tr)=>seededSeries(seed,n,base,vol,tr);
  const G=(inner,tag)=>`<div class="grid3">${inner}</div>`; // 3-up grid

    return G(
      mc('T3M average revenue',C(t3m,'line','#3f7fd6'),money0(t3m[t3m.length-1])+'/mo',`Rolling 3-month average revenue — the headline runrate. Currently ${trendW}.`)+
      mc('Runrate: recent vs prior',{lines:[{name:'Recent 1–3m',data:roll(act,3).slice(-12),color:'#128081'},{name:'Prior 3–6m',data:roll(act,3).slice(-15,-3),color:'#9fb0b3',dashed:true}],legend:true},up?'accelerating':down?'decelerating':'steady',`Recent 1–3m window vs the prior 3–6m window — the early-deterioration signal. ${down?'Recent sits below prior, confirming the slowdown.':'Recent holds at or above prior.'}`)+

      mc('Existing Uncapped balance',pspec,dTot?money0(dTot)+' external':'no external debt',hasReal?`Prior Uncapped facility peaked at ${money0(Math.max(...prin))} and drew down toward £0 — a clean repayment relationship.`:`Monthly closing principal. ${dTot?money0(dTot)+' of external debt on file across '+d.debt_count+' facilit'+(d.debt_count!=1?'ies':'y')+'.':'No third-party debt — unleveraged.'}`)+
      mc('Debt repayment forecast',C(S(i+13,42,(dTot||P)/22,(dTot||P)/40,0),'bars','#8a5a00',24),'',`Scheduled repayments (actuals) plus the projected remaining schedule for identified facilities. Steady cadence, no arrears on the ledger.`));
  }

      mc('Source coverage',C(covBars,'bars','#128081'),covBars.filter(v=>v).length+'/'+covBars.length+' connected',`Share of expected data sources connected. ${covBars.includes(0)?'A card-processing feed is missing — completeness gap flagged.':'All feeds connected — full coverage.'}`)+
      mc('History harvested',C(S(i+31,12,20,4,.08).map(v=>Math.min(24,Math.round(v))),'bars','#3f7fd6'),'~24 mo',`Months of bank history harvested per account — depth the model can rely on. Freshness synced within the last week.`)+

function plRows(d){

  return `<table class="pl">

    ${r('tot','Cash margin',cm,cmn)}${r('sub','Cash margin %',(cm/R*100).toFixed(1)+'%',(cmn/Rn*100).toFixed(1)+'%')}
    ${r('','Fixed costs',fix,fix)}${r('','Taxes',tax,taxn)}

    ${r('ext','Capex',capex,capexn)}${r('ext','Debt repayments',drep,drepn)}${r('ext','Other categories',other,othern)}
    ${r('ext tot','Net cash movement',netmov,netmovn)}${r('ext','Closing cash',closing,closingn)}
  </table>`;
}

/* debt facilities + editable schedule */
function debtLoans(d){
  if(d.debt_total!=null){
    if(!d.debt_total||!d.debt_count)return [];
    const per=Math.round(d.debt_total/d.debt_count);
    return Array.from({length:d.debt_count},(_,i)=>['External facility '+(i+1),'Term',i<d.debt_count-1?per:d.debt_total-per*(d.debt_count-1),Math.round(per*0.11)]);
  }
  return [];
}
function debtRows(d){return debtLoans(d).map((l,i)=>`<tr id="dl${i}"><td>${l[0]}</td><td>${l[1]}</td>

function toggleExclude(i){const c=document.getElementById('dls'+i),on=c.textContent==='Included';

  const fRows=fmonths.map(m=>`<tr><td>${m}</td><td class="num"><input class="editcell mini2" value="0" onchange="this.classList.add('chg')"> / <input class="editcell mini2" value="${-out}" onchange="this.classList.add('chg')"></td></tr>`).join('');

const CAT_OPTS=['Revenue','Variable costs','Fixed costs','Taxes','Debt repayment','Owners inflow','Intra-company transfer','Special inflow','Uncategorised'];

function tabCateg(d){CATG[d.id]=CATG[d.id]||{sub:'pl',filter:'all',touched:false,txns:txnData(d)};renderCateg(d.id);}
function fmtDate(s){const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const p=s.split('-');return (+p[2])+' '+M[+p[1]-1]+' '+p[0].slice(2);}
function catStatus(t){return t.flag?'<span class="chip c-warning">Review</span>':t.resolved?'<span class="chip c-success">Resolved</span>':'<span class="chip c-neutral">Auto</span>';}
function aiTxnPanel(flagged){
  if(!flagged.length)return '';
  const abs=t=>Math.abs(t.amt), suspected=flagged.reduce((s,t)=>s+abs(t),0);
  const wire=flagged.find(t=>/wire/i.test(t.desc));
  const cash=flagged.filter(t=>/atm|deposit/i.test(t.desc)).reduce((s,t)=>s+abs(t),0);
  const intra=flagged.find(t=>/transfer/i.test(t.desc));
  const chips=[];
  if(wire)chips.push({tint:'#e0a400',icon:ICON.inflow,amount:money0(abs(wire)),label:'Inbound wire — no counterparty'});
  if(intra)chips.push({tint:'#7c5cff',icon:ICON.transfer,amount:money0(abs(intra)),label:'Transfer to '+((intra.desc||'').replace(/^Transfer to /,''))});
  if(cash)chips.push({tint:'#3f7fd6',icon:ICON.cash,amount:money0(cash),label:'Cash / ATM deposits'});
  return aiSummaryCard({title:'Transaction summary',metric:money0(suspected),flag:'Flagged as unusual',flagCls:'warn',flagIcon:AI_ALERT,
    body:"These don't fit the seller's usual Amazon / Shopify settlement pattern. Until each is explained by connected data, the reported cash position may be overstated. Recommend confirming source of funds before sizing an offer.",chips});
}
function renderCateg(id){
  const d=byId(id),st=CATG[id],tx=st.txns;
  const flagged=tx.filter(t=>t.flag),toReview=flagged.length;
  const conf=Math.round(tx.reduce((s,t)=>s+t.conf,0)/tx.length);
  const issues=d.hygiene.filter(h=>h[1]!=='g').length;
  const bookTotal=(1400+Math.round(d.preoffer/220)).toLocaleString('en-GB');
  const rows=(st.filter==='flagged'?flagged:tx);
  const txPane= `
    <div class="card">
      <div class="txhead">
        <div>
          <div class="txtitle">Transactions <span class="txcount">· ${toReview} to review</span></div>
          <div class="txsub">${bookTotal} categorised automatically · ${conf}% mean confidence${issues?` · ${issues} data issue${issues!=1?'s':''}`:' · all flags cleared'}</div>
        </div>
        <div class="txactions">
          ${st.touched?`<span class="autosave" id="autosave-${id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>Autosaved</span>`:''}
          <label class="toggle"><input type="checkbox" ${st.filter==='flagged'?'checked':''} onchange="catFilter('${id}')"><span class="sw"></span>Show only flagged</label>
          <button class="btn btn-primary btn-sm" onclick="acceptAll('${id}')" ${toReview?'':'disabled'}>Accept all suggestions</button>
        </div>
      </div>
      <div style="overflow:auto">
      <table class="grid flat compact txgrid"><colgroup><col style="width:80px"><col><col style="width:150px"><col style="width:92px"><col style="width:92px"><col style="width:180px"><col style="width:66px"><col style="width:84px"></colgroup><thead><tr><th class="nowrap">Date</th><th>Description</th><th>Counterparty</th><th class="num">Amount</th><th class="nowrap">Account</th><th>Category</th><th class="num">Conf.</th><th>Status</th></tr></thead>
      <tbody>${rows.map(t=>{const gi=tx.indexOf(t),cc=t.conf<60?'lo':t.conf<85?'mid':'hi';
        return `<tr class="${t.flag?'flagged':''}"><td class="mono nowrap">${fmtDate(t.date)}</td><td>${t.desc}</td><td class="${t.merch==='—'?'muted':''}">${t.merch}</td><td class="num mono">${money(t.amt)}</td>
        <td class="mono muted nowrap">••••${t.acct}</td>
        <td><select class="txsel" onchange="recat('${id}',${gi},this.value)">${CAT_OPTS.map(o=>`<option ${o===t.cat?'selected':''}>${o}</option>`).join('')}</select></td>
        <td class="num"><span class="conf ${cc}">${t.conf}%</span></td>
        <td>${catStatus(t)}</td></tr>`}).join('')}
      ${rows.length?'':'<tr><td colspan="8" class="muted" style="text-align:center;padding:24px">Nothing left to review — all flags cleared ✓</td></tr>'}</tbody></table></div>
    </div>`;

    ${aiTxnPanel(flagged)}

      <div class="st ${st.sub==='tx'?'on':''}" onclick="catSub('${id}','tx')">Transactions</div></div>
    ${st.sub==='tx'?txPane:`<div class="card">${monthlyPL(d)}</div>`}`;
}
function acceptAll(id){CATG[id].txns.forEach(t=>{if(t.flag){t.flag=false;t.resolved=true;t.conf=Math.max(t.conf,88);}});CATG[id].filter='all';CATG[id].touched=true;renderCateg(id);flashSaved(id);toast('All suggestions accepted');}
function catFilter(id){CATG[id].filter=CATG[id].filter==='flagged'?'all':'flagged';renderCateg(id);}
function catSub(id,s){CATG[id].sub=s;renderCateg(id);}
function flashSaved(id){const el=document.getElementById('autosave-'+id);if(!el)return;
  el.classList.add('saving');el.lastChild.textContent='Saving…';
  setTimeout(()=>{el.classList.remove('saving');el.lastChild.textContent='Saved';},550);}
function recat(id,i,val){const t=CATG[id].txns[i];t.cat=val;
  if(val!=='Uncategorised'){t.conf=100;t.flag=false;t.resolved=true;}
  CATG[id].touched=true;renderCateg(id);flashSaved(id);}
function recentMonths(n){const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];let y=2026,m=6;const out=[];for(let i=0;i<n;i++){out.unshift(M[m]+' '+String(y).slice(2));m--;if(m<0){m=11;y--;}}return out;}
function monthlyPL(d){
  const n=6, labels=recentMonths(n);
  let s=(d.preoffer%97)+13; const rnd=()=>{s=(s*9301+49297)%233280;return s/233280;};
  const scale=d.preoffer*5/12;                                   // monthly revenue scale
  const dip=d.revTrend==='down'?-0.10:d.revTrend==='up'?0.06:0.01;
  const rev=[]; for(let i=0;i<n;i++){rev.push(Math.round(scale*(0.9+0.2*rnd())*(1+dip*i/n)));}
  const line=(f,amp)=>rev.map(r=>-Math.round(r*f*(1-amp/2+amp*rnd())));
  const fixed=f=>rev.map(()=>-Math.round(scale*f));
  const adv=line(.15,.18), post=line(.025,.2), inv=line(.45,.12);
  const cogs=rev.map((_,i)=>adv[i]+post[i]+inv[i]);
  const gp=rev.map((r,i)=>r+cogs[i]);
  const pay=line(.16,.05), ins=fixed(.013), util=line(.05,.12), soft=fixed(.011), gen=line(.03,.28);
  const opex=rev.map((_,i)=>pay[i]+ins[i]+util[i]+soft[i]+gen[i]);
  const tax=line(.08,.15), debt=fixed(.05);
  const net=rev.map((_,i)=>gp[i]+opex[i]+tax[i]+debt[i]);
  const fmt=v=>(v<0?'−':'')+Math.abs(v).toLocaleString('en-GB');
  const pctf=v=>v==null?'—':(v<0?'−':'')+Math.abs(v).toFixed(1)+'%';
  const cells=vals=>vals.map(v=>`<td class="n${v<0?' neg':''}">${fmt(v)}</td>`).join('');
  const pcell=vals=>vals.map(v=>`<td class="n">${pctf(v)}</td>`).join('');
  const L=(label,vals,cls='')=>`<tr class="${cls}"><td>${label}</td>${cells(vals)}</tr>`;
  const P=(label,vals)=>`<tr class="pct"><td>${label}</td>${pcell(vals)}</tr>`;
  const S=label=>`<tr class="sec"><td colspan="${n+1}">${label}</td></tr>`;
  const growth=rev.map((r,i)=>i===0?null:(r-rev[i-1])/rev[i-1]*100);
  const gm=gp.map((g,i)=>g/rev[i]*100), nm=net.map((v,i)=>v/rev[i]*100);
  return `
   <div class="pl-head"><span class="pl-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg></span>Monthly cash-based P&amp;L</div>
   <div style="overflow-x:auto"><table class="plt">
     <thead><tr><th>£ · cash-based</th>${labels.map(l=>`<th>${l}</th>`).join('')}</tr></thead>
     <tbody>
       ${S('Revenue')}
       ${L('Revenue',rev)}
       ${L('Total revenue',rev,'tot')}
       ${P('Revenue growth %',growth)}
       ${S('Cost of goods sold')}
       ${L('Advertising',adv)}
       ${L('Postage',post)}
       ${L('Inventory',inv)}
       ${L('Total cost of goods sold',cogs,'tot')}
       ${L('Gross profit',gp,'tot')}
       ${P('Gross margin',gm)}
       ${S('Operational expenses')}
       ${L('Payroll and consultants',pay)}
       ${L('Insurance',ins)}
       ${L('Utilities',util)}
       ${L('Software',soft)}
       ${L('General payment',gen)}
       ${L('Total operational expenses',opex,'tot')}
       ${S('Taxes & financing')}
       ${L('Taxes',tax)}
       ${L('Debt repayment',debt)}
       ${L('Net cash profit',net,'net')}
       ${P('Net margin',nm)}
     </tbody>
   </table></div>`;
}

let GAL={list:[],idx:0};
