<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uncapped · Underwriting — Lending platform (prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== Back-office design tokens (uncapped-design → references/back-office.md) ===== */
:root{
  --brand-600:#128081; --brand-700:#00696b; --brand-200:#eaf6f6; --brand-300:#c1e5e6; --brand-100:#f1f9f9;
  --ink:#12171c; --text-2:#40484f; --text-3:#6b747b; --disabled:#949a9e; --icon:#292e32;
  --navy:#063844; --page:#f0f3f4; --surface:#fff; --grey-1:#f5f8f9; --grey-2:#f0f2f4;
  --border:#d7dce0; --cell:#f0f2f4; --link:#167c7e;
  --success:#00696b; --success-bg:#eaf6f6; --success-bd:#c1e5e6;
  --error:#a5182d; --error-bg:#feebee; --error-bd:#fccfd6;
  --warning:#753b00; --warning-bg:#fff0d6; --warning-bd:#ffd68f;
  --info:#105c70; --info-bg:#e3f7fc; --info-bd:#c7e4eb;
  --green:#1f7a3d; --green-bg:#e9f7ee; --green-bd:#bfe6cc;
  --amber-t:#8a5a00; --amber-bg:#fff4e0; --amber-bd:#ffd68f;
  --red-t:#a5182d; --red-bg:#feebee; --red-bd:#fccfd6;
  --r:8px; --r-btn:8px;
  --sh-1:0 1px 2px rgba(0,0,0,.05),0 1px 5px rgba(0,0,0,.04);
  --sh-6:0 2px 3px rgba(0,0,0,.07),0 8px 24px rgba(0,0,0,.10);
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:Inter,system-ui,Arial,sans-serif;font-weight:500;color:var(--ink);
  background:var(--page);font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased}
a{color:var(--link);text-decoration:none}
h1,h2,h3,h4{margin:0;font-weight:700;color:var(--ink)}
.mono{font-variant-numeric:tabular-nums}
button{font-family:inherit}

/* ===== App shell ===== */
.app{display:flex;min-height:100vh}
.side{width:236px;flex:0 0 236px;background:#fff;border-right:1px solid var(--border);
  position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:14px 0;overflow:auto}
.side .logo{padding:2px 18px 10px;display:flex;align-items:center;gap:8px}
.side .logo .wm{font-weight:800;font-size:18px;color:var(--navy);letter-spacing:-.02em}
.side .lender{margin:2px 12px 12px;padding:9px 11px;border-radius:var(--r);background:var(--brand-100);
  border:1px solid var(--brand-300);cursor:pointer}
.side .lender .k{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--brand-700);font-weight:700}
.side .lender .n{display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:700;font-size:13px;margin-top:2px}
.side .lender .n svg{width:14px;height:14px;color:var(--text-3)}
.side .search{padding:2px 14px 8px}
.side .search .box{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:var(--r);padding:6px 9px}
.side .search svg{width:15px;height:15px;color:var(--text-3);flex:0 0 15px}
.side .search input{border:none;outline:none;font-family:inherit;font-size:12px;width:100%;color:var(--ink);background:none}
.nav{padding:2px 0}
.nav a{display:flex;align-items:center;gap:11px;padding:8px 18px;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer}
.nav a svg{width:17px;height:17px;flex:0 0 17px;color:var(--text-3)}
.nav a:hover{background:var(--grey-1);color:var(--ink)}
.nav a.active{background:var(--brand-100);color:var(--brand-700);font-weight:600;box-shadow:inset 3px 0 0 var(--brand-600)}
.nav a.active svg{color:var(--brand-600)}
.side .foot{margin-top:auto;padding:12px 18px;border-top:1px solid var(--cell);font-size:11px;color:var(--text-3)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{min-height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 24px;position:sticky;top:0;z-index:20}
.crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2)}
.crumbs b{color:var(--ink);font-weight:600}
.crumbs .sep{color:var(--disabled)}
.crumbs .lnk{cursor:pointer}
.crumbs .lnk:hover{color:var(--brand-700)}
.spacer{flex:1}
.proto{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--warning);
  background:var(--warning-bg);border:1px solid var(--warning-bd);border-radius:20px;padding:3px 10px}
.usr{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2)}
.avatar{width:28px;height:28px;border-radius:9999px;background:var(--brand-200);color:var(--brand-700);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.content{padding:20px clamp(18px,1.5vw,30px) 80px;max-width:2600px;width:100%;margin:0 auto}
.mi{--mi-min:230px}
.fcrow{display:flex;gap:16px;align-items:flex-start}
.fcright{flex:1;min-width:0}

/* ===== Primitives ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-1);overflow:hidden}
.card-h{padding:12px 15px;border-bottom:1px solid var(--cell);display:flex;align-items:center;gap:10px}
.card-h h3{font-size:14px}
.card-h .sub{font-size:12px;color:var(--text-3);font-weight:500}
.card-b{padding:15px}
.muted{color:var(--text-3)} .small{font-size:12px}
.lbl{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);font-weight:700}
.btn{font-weight:600;font-size:14px;border-radius:var(--r-btn);border:1px solid transparent;padding:8px 15px;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;line-height:1;white-space:nowrap;appearance:none;-webkit-appearance:none}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--brand-300)}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--brand-600);color:#fff} .btn-primary:hover{background:var(--brand-700)}
.btn-outline{background:#fff;color:var(--ink);border-color:var(--border)} .btn-outline:hover{background:var(--grey-1)}
.btn-sm{padding:5px 10px;font-size:13px}
.chip{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:6px;
  font-size:12px;font-weight:600;border:1px solid transparent;white-space:nowrap}
.chip .dot{width:7px;height:7px;border-radius:9999px;background:currentColor;opacity:.9}
.c-success{background:var(--success-bg);border-color:var(--success-bd);color:var(--success)}
.c-error{background:var(--error-bg);border-color:var(--error-bd);color:var(--error)}
.c-warning{background:var(--warning-bg);border-color:var(--warning-bd);color:var(--warning)}
.c-info{background:var(--info-bg);border-color:var(--info-bd);color:var(--info)}
.c-neutral{background:var(--grey-2);border-color:var(--border);color:var(--text-2)}

/* rating pill A–F */
.rating{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:var(--r);
  font-weight:800;font-size:13px}
.rt-A,.rt-B{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.rt-C{background:var(--grey-2);color:var(--text-2);border:1px solid var(--border)}
.rt-D{background:var(--amber-bg);color:var(--amber-t);border:1px solid var(--amber-bd)}
.rt-E,.rt-F{background:var(--red-bg);color:var(--red-t);border:1px solid var(--red-bd)}

/* tables */
table.grid{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
table.grid th{position:sticky;top:0;background:#f9fbfc;text-align:left;font-weight:700;font-size:11px;
  text-transform:uppercase;letter-spacing:.03em;color:var(--text-2);padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;z-index:1}
table.grid td{padding:10px 12px;border-bottom:1px solid var(--cell);vertical-align:middle}
table.grid.flat th{position:static}
table.grid tr.clickable{cursor:pointer}
table.grid tr.clickable:hover td{background:var(--brand-100)}
table.grid td.num,table.grid th.num{text-align:right;font-variant-numeric:tabular-nums}
table.grid tfoot td{font-weight:700;border-top:2px solid var(--border);background:#fbfdfd}
.goarrow{width:26px;height:26px;border-radius:9999px;border:1px solid var(--border);display:inline-flex;
  align-items:center;justify-content:center;color:var(--brand-700);background:#fff}
tr.clickable:hover .goarrow{background:var(--brand-600);color:#fff;border-color:var(--brand-600)}

/* MI strip */
.mi{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr;gap:14px;margin-bottom:18px}
.mi .card-b{padding:14px 16px}
.mi .k{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:700}
.mi .v{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:5px}
.mi .s{font-size:12px;color:var(--text-3);margin-top:3px}
.mi .pie-wrap{display:flex;align-items:center;gap:14px}
.legend{display:flex;flex-direction:column;gap:3px;font-size:11.5px}
.legend .li{display:flex;align-items:center;gap:6px} .legend .sw{width:9px;height:9px;border-radius:2px}

/* deal header sticky */
.dealhead{position:sticky;top:56px;z-index:15;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--sh-1);padding:13px 16px;margin-bottom:0}
.dealhead .top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dealhead .org{font-size:18px;font-weight:800;letter-spacing:-.01em}
.dh-facts{display:flex;gap:22px;flex-wrap:wrap;margin-left:auto}
.dh-facts .f .k{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:700}
.dh-facts .f .v{font-size:14px;font-weight:700;margin-top:1px}

/* tabs */
.tabs{position:sticky;top:calc(56px);z-index:14;display:flex;gap:2px;background:var(--page);
  border-bottom:1px solid var(--border);margin-top:14px;padding-top:6px}
.tabs .t{padding:9px 15px;font-weight:600;font-size:13.5px;color:var(--text-2);cursor:pointer;
  border-bottom:2px solid transparent;text-transform:none}
.tabs .t:hover{color:var(--ink)}
.tabs .t.on{color:var(--brand-700);border-bottom-color:var(--brand-600)}
.tabpane{padding-top:18px}
.tabpane[hidden]{display:none}

/* notes dock */
.notes{position:fixed;right:22px;bottom:0;width:340px;z-index:40;background:#fff;border:1px solid var(--border);
  border-bottom:none;border-radius:8px 8px 0 0;box-shadow:var(--sh-6)}
.notes .nh{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--navy);color:#fff;
  border-radius:8px 8px 0 0;cursor:pointer;font-weight:700;font-size:13px}
.notes .nh .sp{flex:1} .notes .nh svg{width:15px;height:15px;opacity:.85}
.notes .nb{padding:11px 13px}
.notes textarea{width:100%;min-height:120px;border:1px solid var(--border);border-radius:var(--r);padding:9px;
  font-family:inherit;font-size:13px;resize:vertical;color:var(--ink)}
.notes.min .nb{display:none}
.notes .save{font-size:11px;color:var(--text-3);margin-top:6px}

/* misc */
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:14px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
.kv{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:13px}
.kv dt{color:var(--text-3);font-weight:600} .kv dd{margin:0;font-weight:600}
.checkrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--cell);font-size:13px}
.checkrow:last-child{border-bottom:none}
.checkrow .st{width:78px;flex:0 0 78px}
.checkrow .nm{font-weight:600} .checkrow .dt{color:var(--text-3);margin-left:auto;font-size:12px;text-align:right}
.dotg{color:var(--green)} .dota{color:var(--amber-t)} .dotr{color:var(--red-t)}
.stub{border:1px dashed var(--border);border-radius:var(--r);padding:30px;text-align:center;color:var(--text-3);background:#fff}
.stub b{color:var(--text-2)}
.warnlab{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--warning);
  background:var(--warning-bg);border:1px solid var(--warning-bd);border-radius:20px;padding:2px 8px}
.thumbs{display:flex;gap:8px} .thumb{width:52px;height:52px;border-radius:var(--r);border:1px solid var(--border);
  background:var(--grey-1);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:10px;text-align:center}

/* accordion (RAG) */
.acc .arow{border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;background:#fff}
.acc .ahead{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer}
.acc .arow.g .ahead{background:var(--green-bg)} .acc .arow.a .ahead{background:var(--amber-bg)} .acc .arow.r .ahead{background:var(--red-bg)}
.acc .aname{font-weight:700;font-size:14px;min-width:190px}
.acc .adetail{color:var(--text-2);font-size:13px;flex:1}
.acc .acaret{transition:transform .15s} .acc .arow.open .acaret{transform:rotate(180deg)}
.acc .abody{padding:14px;border-top:1px solid var(--cell);display:none}
.acc .arow.open .abody{display:block}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:#fff}
.seg button{border:none;background:#fff;padding:4px 9px;font-weight:700;font-size:12px;cursor:pointer;color:var(--text-3)}
.seg button.on.g{background:var(--green);color:#fff} .seg button.on.a{background:var(--amber-t);color:#fff} .seg button.on.r{background:var(--red-t);color:#fff}

/* scorecards strip */
.scstrip{display:grid;grid-template-columns:repeat(6,1fr);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.scstrip .sc{padding:12px;text-align:center;border-right:1px solid var(--cell)}
.scstrip .sc:last-child{border-right:none}
.scstrip .g{font-size:22px;font-weight:800;padding:6px 0;border-radius:var(--r);margin-bottom:6px}
.scstrip .lab{font-size:12px;color:var(--text-2);font-weight:600}

/* forecast controls + P&L */
.ctlbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.scen{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.scen button{border:none;background:#fff;padding:7px 14px;font-weight:600;font-size:13px;cursor:pointer;color:var(--text-2)}
.scen button.on{background:var(--brand-600);color:#fff}
.pl{width:100%;border-collapse:collapse;font-size:13px}
.pl td{padding:5px 12px;border-bottom:1px solid var(--cell)}
.pl td.num{text-align:right;font-variant-numeric:tabular-nums}
.pl tr.hd td{font-weight:800;background:var(--grey-1);text-transform:uppercase;font-size:11px;letter-spacing:.03em;color:var(--text-2)}
.pl tr.sub td{color:var(--text-3);font-size:12px;padding-top:1px;padding-bottom:6px}
.pl tr.tot td{font-weight:700;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(6,20,24,.45);z-index:60;display:flex;align-items:center;justify-content:center;padding:30px}
.modal{background:#fff;border-radius:8px;box-shadow:var(--sh-6);max-width:1080px;width:100%;max-height:88vh;display:flex;flex-direction:column}
.modal .mh{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal .mh h3{font-size:15px}
.modal .mb{padding:16px 18px;overflow:auto}
.modal .x{margin-left:auto;cursor:pointer;color:var(--text-3);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);font-size:15px}
.modal .x:hover{background:var(--grey-1)}
.editcell{width:78px;text-align:right;border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-family:inherit;font-size:12px;font-variant-numeric:tabular-nums}
.editcell.chg{background:var(--warning-bg);border-color:var(--warning-bd);font-weight:700;color:var(--warning)}
.rocell{color:var(--text-3);font-variant-numeric:tabular-nums}
/* chart gallery (expanded) */
.galbody{padding:0!important}
.galstage{display:flex;align-items:center;gap:8px;padding:14px 14px 6px}
.galmain{flex:1;min-width:0}
.galnav{flex:0 0 40px;height:40px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink)}
.galnav:hover:not(:disabled){background:var(--brand-100);border-color:var(--brand-300);color:var(--brand-700)}
.galnav:disabled{opacity:.3;cursor:default}
.galnav svg{width:20px;height:20px}
.galthumbs{display:flex;gap:8px;overflow-x:auto;padding:10px 14px 14px;border-top:1px solid var(--cell);background:var(--grey-1);border-radius:0 0 8px 8px}
.galthumb{flex:0 0 168px;border:1px solid var(--border);border-radius:8px;background:#fff;padding:7px 9px 4px;cursor:pointer;text-align:left}
.galthumb:hover{border-color:var(--brand-300)}
.galthumb.on{border-color:var(--brand-600);box-shadow:inset 0 0 0 1px var(--brand-600)}
.galthumb .gtlab{font-size:10px;font-weight:700;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}

/* expand-a-chart + toast */
.bigchart svg{height:340px!important;width:100%}
.minic:hover{box-shadow:0 0 0 1px var(--brand-300)!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
  padding:11px 18px;border-radius:8px;box-shadow:var(--sh-6);z-index:80;font-weight:600;font-size:13px}
/* categorisation */
.subtabs{display:flex;gap:18px;border-bottom:1px solid var(--border);margin-bottom:14px}
.subtabs .st{padding:8px 2px;font-weight:600;font-size:13px;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent}
.subtabs .st.on{color:var(--brand-700);border-bottom-color:var(--brand-600)}
.catbtns{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.catbtn{border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;background:#fff;text-align:left;cursor:pointer;font-family:inherit}
.catbtn:hover{border-color:var(--brand-300);background:var(--brand-100)}
.catbtn.on{border-color:var(--brand-600);box-shadow:inset 0 0 0 1px var(--brand-600)}
.catbtn .k{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:700}
.catbtn .v{font-size:22px;font-weight:800;margin-top:4px}
.catbtn .s{font-size:12px;color:var(--text-3);margin-top:2px}
.txsel{font-family:inherit;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:3px 6px;background:#fff}
.conf{display:inline-block;min-width:38px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.conf.lo{color:var(--red-t)} .conf.mid{color:var(--amber-t)} .conf.hi{color:var(--text-3)}
table.grid tr.flagged td{background:var(--warning-bg)}

/* crisp, consistent icon rendering (chrome only — not charts) */
.side svg,.topbar svg,.crumbs svg,.btn svg,.goarrow svg,.notes svg,.warnlab svg,.proto svg,.accaret{
  stroke-linecap:round;stroke-linejoin:round}

/* ===== large-screen + reflow ===== */
@media(max-width:1200px){
  .fcrow{flex-direction:column}
  .fcpl{position:static!important;flex:0 0 auto!important;width:100%}
}
@media(max-width:1000px){.mi{grid-template-columns:1fr 1fr}.dh-facts{margin-left:0}}
@media(max-width:640px){.mi{grid-template-columns:1fr}.catbtns{grid-template-columns:1fr}}

/* ===== Ravi sidebar nav ===== */
.side .logo svg{height:22px;width:auto;display:block}
.side .navgrp{padding:2px 0}
.side .navgrp .ni{display:flex;align-items:center;gap:10px;padding:8px 16px;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;width:100%;border:none;background:none;font-family:inherit;text-align:left}
.side .navgrp .ni:hover{background:var(--grey-1);color:var(--ink)}
.side .navgrp .ni.active{background:var(--brand-100);color:var(--brand-700);font-weight:600;box-shadow:inset 3px 0 0 var(--brand-600)}
.side .navgrp .ni svg{width:17px;height:17px;flex:0 0 17px;color:var(--text-3);stroke-linecap:round;stroke-linejoin:round}
.side .navgrp .ni.active svg{color:var(--brand-600)}
.side .orgcard{margin:8px 12px 4px;padding:9px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--grey-1)}
.side .orgcard .on{font-weight:700;font-size:13px}
.side .orgcard .oi{font-size:11px;color:var(--text-3)}
.side .grp-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;padding:8px 16px 2px}
.side .profile{display:flex;align-items:center;gap:9px;padding:11px 16px;border-top:1px solid var(--cell)}
.side .profile .pn{font-weight:700;font-size:13px;line-height:1.2}.side .profile .pr{font-size:11px;color:var(--text-3)}

/* ===== deal workspace: snapshot + verdict ===== */
.snap{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-1);padding:13px 18px;margin-bottom:14px}
.snap-top{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.snap-id{display:flex;gap:13px;align-items:center}
.org-logo{width:42px;height:42px;border-radius:8px;background:var(--brand-200);color:var(--brand-700);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
.snap-h{font-size:18px;font-weight:800;letter-spacing:-.01em}
.snap-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12.5px;color:var(--text-2);margin-top:3px}
.snap-meta .mid{width:3px;height:3px;border-radius:50%;background:var(--disabled)}
.snap-meta .lock{display:inline-flex;align-items:center;gap:5px;color:var(--text-3)}
.snap-meta .lock svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
.snap-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.verdict{display:grid;grid-template-columns:repeat(6,1fr);margin:12px -18px -13px;padding:11px 18px;background:var(--grey-1);border-top:1px solid var(--border);border-radius:0 0 var(--r) var(--r)}
@media(max-width:1000px){.verdict{grid-template-columns:repeat(3,1fr);row-gap:14px}}
.verdict .vc{display:flex;flex-direction:column;gap:5px;padding:2px 22px;border-right:1px solid var(--border)}
.verdict .vc:first-child{padding-left:0}
.verdict .vc:last-child{border-right:none;padding-right:0}
.verdict .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.verdict .val{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.rag-dot{width:11px;height:11px;border-radius:50%}
.rag-dot.g{background:#2fb35a}.rag-dot.a{background:#f4a41f}.rag-dot.r{background:#e0473f}
.exc-num{font-size:18px;font-weight:800;color:var(--warning)}

/* spine (steps at top) */
/* ===== step spine: clean flat tabs — grey default, teal active underline on the card line ===== */
.spine{display:flex;justify-content:space-between;background:#fff;border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--sh-1);padding:0 12px;margin-bottom:16px;overflow-x:auto;position:sticky;top:56px;z-index:12}
.sstep{position:relative;display:flex;align-items:center;gap:9px;border:none;background:none;cursor:pointer;
  padding:15px 8px;white-space:nowrap;color:var(--text-3);font-family:inherit;transition:color .12s}
.sstep::after{content:"";position:absolute;left:6px;right:6px;bottom:0;height:2.5px;border-radius:2px 2px 0 0;background:transparent;transition:background .15s}
.sstep:hover{color:var(--ink)}
.sstep .sic{display:flex;align-items:center;justify-content:center;color:currentColor}
.sstep .sic svg{width:18px;height:18px;stroke-linecap:round;stroke-linejoin:round}
.sstep .slabel{font-size:14px;font-weight:600;letter-spacing:-.01em}
.sstep.cur{color:var(--brand-700)}
.sstep.cur .slabel{font-weight:700}
.sstep.cur::after{background:var(--brand-600)}
.sdot{width:6px;height:6px;border-radius:50%;flex:0 0 6px}
.sdot.amber{background:var(--warning)} .sdot.red{background:var(--error)}

/* work grid + right rail (tabbed) */
.work{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px;align-items:start}
.step-host{min-width:0}
.rail{position:sticky;top:112px;height:calc(100vh - 128px);display:flex;flex-direction:column}
.rail-tabs{flex:0 0 auto;display:flex;background:#fff;border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;overflow:hidden}
.rail-tabs .rt{flex:1;border:none;background:#fff;padding:9px 6px;font-family:inherit;font-weight:600;font-size:12px;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:5px}
.rail-tabs .rt:hover{background:var(--grey-1)}
.rail-tabs .rt.on{color:var(--brand-700);border-bottom-color:var(--brand-600)}
.rt-badge{background:var(--warning-bg);color:var(--warning);border:1px solid var(--warning-bd);border-radius:20px;font-size:10px;font-weight:800;padding:0 6px;min-width:17px;text-align:center}
.rail-body{flex:1 1 auto;min-height:0;background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:12px;overflow:auto}
.exc{display:flex;gap:9px;padding:10px 8px;border-radius:6px;border:1px solid var(--cell);margin-bottom:8px}
.exc .sev{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 8px}
.exc.high .sev{background:var(--red-t)} .exc.med .sev{background:var(--amber-t)}
.exc .et{font-weight:600;font-size:13px;line-height:1.35}
.exc .eloc{font-size:11px;color:var(--text-3);margin-top:2px}
.exc .ego{margin-top:7px;display:flex;gap:6px}
.exc.done{opacity:.5}
.rnote{border-bottom:1px solid var(--cell);padding:9px 2px;font-size:13px}
.rnote .who{font-size:11px;color:var(--text-3);font-weight:600;margin-bottom:3px}
.note-add textarea{width:100%;min-height:70px;border:1px solid var(--border);border-radius:var(--r);padding:8px;font-family:inherit;font-size:13px;resize:vertical}
.hrow{display:flex;gap:9px;padding:8px 2px;border-bottom:1px solid var(--cell);font-size:12.5px}
.hrow .ht{color:var(--text-3);font-variant-numeric:tabular-nums;flex:0 0 42px}
@media(max-width:1150px){.work{grid-template-columns:1fr}.rail{position:static;height:auto;display:block}}

/* forecast: controls + context charts */
.fc2{display:grid;grid-template-columns:250px 1fr;gap:18px;align-items:start}
@media(max-width:920px){.fc2{grid-template-columns:1fr}}
.fcctl label{display:block;font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:11px}
.fcctl label .muted{font-weight:500}
.fcctl select,.fcctl input[type=number]{display:block;width:100%;margin-top:4px;font-family:inherit;font-size:13px;border:1px solid var(--border);border-radius:var(--r);padding:6px 8px;background:#fff}
.fcout{min-width:0}
.fc-ctx-lbl{font-size:11px;font-weight:700;color:var(--brand-700);background:var(--brand-100);border:1px solid var(--brand-300);border-radius:20px;padding:3px 10px;display:inline-flex;align-items:center;gap:5px;margin:16px 0 9px}
.fc-src{margin-top:16px;border-top:1px dashed var(--cell);padding-top:13px}
.srcchip{border:1px solid var(--border);background:#fff;border-radius:20px;padding:4px 11px;font-family:inherit;font-size:12px;font-weight:600;color:var(--text-2);cursor:pointer;margin:0 6px 6px 0}
.srcchip.on{border-color:var(--brand-300);background:var(--brand-100);color:var(--brand-700)}

/* version / data-lock control */
.verwrap{position:relative}
.verctl{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--text-2);cursor:pointer}
.verctl:hover{background:var(--grey-1)}
.verctl svg{width:13px;height:13px;color:var(--text-3)}
.verctl .vdot{width:6px;height:6px;border-radius:50%;background:var(--success);flex:0 0 6px}
.vermenu{position:absolute;right:0;top:calc(100% + 6px);width:290px;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:var(--sh-6);z-index:50;padding:8px}
.vm-h{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:700;padding:4px 8px}
.vm-refresh{display:flex;align-items:center;gap:8px;width:100%;border:none;background:var(--brand-100);color:var(--brand-700);border-radius:6px;padding:9px 10px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;margin:4px 0}
.vm-refresh:hover{background:var(--brand-200)}
.vm-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:700;padding:8px 8px 3px}
.vm-item{display:flex;align-items:center;gap:8px;width:100%;border:none;background:none;border-radius:6px;padding:7px 10px;font-family:inherit;font-size:13px;color:var(--ink);cursor:pointer;text-align:left}
.vm-item:hover{background:var(--grey-1)}
.vm-item .vtag{margin-left:auto;font-size:11px;color:var(--text-3);font-weight:500}
.vm-item.cur{color:var(--brand-700);font-weight:700}
.vm-note{font-size:11px;color:var(--text-3);padding:8px;border-top:1px solid var(--cell);margin-top:4px;line-height:1.45}

/* about company + products + linked cos */
.ov-top{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:1000px){.ov-top{grid-template-columns:1fr}}
.pthumbs{display:flex;gap:10px;margin-top:7px;flex-wrap:wrap}
.pthumb{display:flex;gap:9px;align-items:center;border:1px solid var(--border);border-radius:8px;padding:6px 12px 6px 6px;background:#fff;text-decoration:none;color:var(--ink)}
.pthumb:hover{border-color:var(--brand-300);background:var(--brand-100)}
.pmeta{display:flex;flex-direction:column}
.pimg{width:38px;height:38px;border-radius:6px;background:var(--grey-1);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--text-3)}
.pn{font-weight:600;font-size:12.5px}.pp{font-size:11px;color:var(--text-3)}
.linkrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px}
.linkchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--link);border:1px solid var(--border);border-radius:20px;padding:4px 11px;background:#fff;cursor:pointer;text-decoration:none}
.linkchip:hover{background:var(--brand-100);border-color:var(--brand-300)}
.linked-item{display:flex;align-items:center;gap:9px;font-size:13px;padding:7px 0;border-bottom:1px solid var(--cell)}
.linked-item:last-child{border-bottom:none}
.linked-item .lg{width:26px;height:26px;flex:0 0 26px;border-radius:6px;background:var(--warning-bg);color:var(--warning);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}

/* Deal at a glance tiles — separate clickable cards */
.glance{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
@media(max-width:1100px){.glance{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.glance{grid-template-columns:repeat(2,1fr)}}
.gtile{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-1);padding:14px 15px;
  cursor:pointer;text-align:left;font-family:inherit;transition:border-color .12s,box-shadow .12s}
.gtile:hover{border-color:var(--brand-300);box-shadow:var(--sh-6)}
.gtile .gtop{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gtile .gk{font-size:11px;color:var(--text-3);font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtile .gtop svg{flex:0 0 auto}
.gtile .gv{font-size:18px;font-weight:800;margin-top:7px;letter-spacing:-.01em;color:var(--ink)}
.gtile .gc{font-size:11.5px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc.up{color:var(--success)}.gc.down{color:var(--error)}.gc.warn{color:var(--warning)}.gc.mut{color:var(--text-3)}
/* connections & data coverage */
.conn{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid var(--cell)}
.conn:last-child{border-bottom:none}
.conn .clogo{width:36px;height:36px;flex:0 0 36px;border-radius:8px;background:var(--grey-1);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-weight:700}
.conn .cn{font-weight:600;font-size:13.5px}
.conn .cm{font-size:12px;color:var(--text-3);margin-top:1px}
.conn .cright{margin-left:auto;text-align:right}
</style>
</head>

function donut(segments, size=92, thick=17){
  const r=(size-thick)/2, cx=size/2, cy=size/2, C=2*Math.PI*r;
  const total=segments.reduce((s,x)=>s+x.v,0)||1; let off=0;
  let rings=segments.map(s=>{
    const len=C*s.v/total; const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${thick}" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`; off+=len; return el;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--grey-2)" stroke-width="${thick}"/>${rings}</svg>`;
}
function line(vals,w=240,h=54,col='var(--brand-600)',fill=true){
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;
  const pts=vals.map((v,i)=>[i*(w/(vals.length-1)),h-4-((v-mn)/rng)*(h-8)]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=fill?`<path d="${d} L ${w} ${h} L 0 ${h} Z" fill="${col}" opacity=".08"/>`:'';
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${area}<path d="${d}" fill="none" stroke="${col}" stroke-width="2"/></svg>`;
}
function bars(vals,w=240,h=54,col='var(--brand-600)'){

  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`+
    vals.map((v,i)=>{const bh=Math.abs(v)/mx*(h-8);const y=v>=0?(h-4-bh):(h-4);return `<rect x="${i*gap+gap*.17}" y="${y}" width="${bw}" height="${bh}" fill="${col}" rx="1"/>`}).join('')+`</svg>`;
}

function C(data,type,color,forecastFrom){return {data:data,type:type||'line',color:color||'var(--brand-600)',forecastFrom:(forecastFrom==null?-1:forecastFrom)};}
let GRAD=0;
function smoothPath(pts){
  if(pts.length<2)return pts.length?`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`:'';
  let d=`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for(let i=0;i<pts.length-1;i++){const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;}
  return d;
}
function axedChart(spec,w,h,full){
  if(spec.series||spec.lines)return multiChart(spec,w,h,full);
  const data=spec.data||[],type=spec.type||'line',color=spec.color||'var(--brand-600)',ff=(spec.forecastFrom==null?-1:spec.forecastFrom);
  const n=data.length||1; let mx=Math.max(...data,0),mn=Math.min(...data,0); if(mx===mn)mx=mn+1;
  const rng0=mx-mn; mx+=rng0*0.08; if(mn<0)mn-=rng0*0.04;
  const padL=48,padR=12,padT=10,padB=full?38:22, iw=w-padL-padR, ih=h-padT-padB, gid='gr'+(GRAD++);
  const X=i=> padL+(n>1? i*(iw/(n-1)) : iw/2);
  const Y=v=> padT+ih-((v-mn)/(mx-mn))*ih;
  const TICKS=full?4:3; let grid='';
  for(let t=0;t<=TICKS;t++){const val=mn+(mx-mn)*t/TICKS,yy=Y(val).toFixed(1);
    grid+=`<line x1="${padL}" y1="${yy}" x2="${w-padR}" y2="${yy}" stroke="var(--line2)" stroke-dasharray="2 5"/><text x="${padL-8}" y="${(Y(val)+3).toFixed(1)}" text-anchor="end" font-size="${full?11:9}" fill="var(--text-3)" font-weight="500">${fmtK(val)}</text>`;}
  const labs=monthSeq(n),step=Math.max(1,Math.ceil(n/(full?12:4))); let xl='';
  labs.forEach((L,i)=>{if(i%step===0)xl+=`<text x="${X(i).toFixed(1)}" y="${(h-padB+(full?15:11)).toFixed(1)}" text-anchor="middle" font-size="${full?10:8}" fill="var(--text-3)">${L}</text>`;});
  const zero= mn<0?`<line x1="${padL}" y1="${Y(0).toFixed(1)}" x2="${w-padR}" y2="${Y(0).toFixed(1)}" stroke="var(--border)"/>`:'';
  const defs=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity="0.20"/><stop offset="1" stop-color="${color}" stop-opacity="0.01"/></linearGradient></defs>`;
  let s='';
  if(type==='bars'){const gap=iw/n,bw=Math.min(gap*.62,26),y0=Y(Math.max(0,mn));
    data.forEach((v,i)=>{const yv=Y(v),top=Math.min(y0,yv),hh=Math.max(1,Math.abs(yv-y0)),fc=ff>=0&&i>=ff;
      s+=`<rect x="${(padL+i*gap+(gap-bw)/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${hh.toFixed(1)}" fill="${fc?'#9fd3d4':color}" rx="${Math.min(3,bw/2).toFixed(1)}" opacity="${fc?0.85:1}"/>`;});
  }else{const pts=data.map((v,i)=>[X(i),Y(v)]);const dp=smoothPath(pts);
    s+=`${defs}<path d="${dp} L ${X(n-1).toFixed(1)} ${Y(mn).toFixed(1)} L ${X(0).toFixed(1)} ${Y(mn).toFixed(1)} Z" fill="url(#${gid})"/>`;
    if(ff>0){const solid=pts.slice(0,ff),dash=pts.slice(ff-1);
      s+=`<path d="${smoothPath(solid)}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round"/>`;
      s+=`<path d="${smoothPath(dash)}" fill="none" stroke="${color}" stroke-width="2.2" stroke-dasharray="5 4" stroke-linecap="round" opacity="0.7"/>`;
      s+=`<line x1="${X(ff).toFixed(1)}" y1="${padT}" x2="${X(ff).toFixed(1)}" y2="${(padT+ih).toFixed(1)}" stroke="var(--border)" stroke-dasharray="2 3"/>`;
      s+=`<text x="${(X(ff)+4).toFixed(1)}" y="${(padT+9).toFixed(1)}" font-size="${full?10:8}" fill="var(--text-3)">forecast</text>`;
    }else s+=`<path d="${dp}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round"/>`;
    const last=pts[pts.length-1]; s+=`<circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="${full?4:2.8}" fill="${color}" stroke="#fff" stroke-width="1.5"/>`;
  }
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">${grid}${zero}${s}${xl}</svg>`;
}
function multiChart(spec,w,h,full){
  const series=spec.series||[], lines=spec.lines||[], ff=(spec.forecastFrom==null?-1:spec.forecastFrom), showLeg=(spec.legend!==false)&&full;
  const n=Math.max(1,...series.map(s=>s.data.length),...lines.map(l=>l.data.length));
  const totals=[]; for(let i=0;i<n;i++){let t=0;series.forEach(s=>t+=(s.data[i]||0));totals.push(t);}
  const lineVals=lines.flatMap(l=>l.data);
  let mx=Math.max(0,...totals,...lineVals), mn=Math.min(0,...lineVals,0); if(mx===mn)mx=mn+1; mx+=(mx-mn)*0.08;
  const legH=showLeg?24:0, padL=48,padR=12,padT=10,padB=(full?38:22)+legH, iw=w-padL-padR, ih=h-padT-padB;
  const X=i=> padL+(n>1? i*(iw/(n-1)):iw/2), Y=v=> padT+ih-((v-mn)/(mx-mn))*ih;
  const TICKS=full?4:3; let grid='';
  for(let t=0;t<=TICKS;t++){const val=mn+(mx-mn)*t/TICKS,yy=Y(val).toFixed(1);
    grid+=`<line x1="${padL}" y1="${yy}" x2="${w-padR}" y2="${yy}" stroke="var(--line2)" stroke-dasharray="2 5"/><text x="${padL-8}" y="${(Y(val)+3).toFixed(1)}" text-anchor="end" font-size="${full?11:9}" fill="var(--text-3)" font-weight="500">${fmtK(val)}</text>`;}
  const labs=monthSeq(n),step=Math.max(1,Math.ceil(n/(full?12:4))); let xl='';
  labs.forEach((L,i)=>{if(i%step===0)xl+=`<text x="${X(i).toFixed(1)}" y="${(padT+ih+(full?15:11)).toFixed(1)}" text-anchor="middle" font-size="${full?10:8}" fill="var(--text-3)">${L}</text>`;});
  let s=''; const gap=iw/n, bw=Math.min(gap*.62,26);
  for(let i=0;i<n;i++){let base=0; const fc=ff>=0&&i>=ff;
    series.forEach(sr=>{const v=sr.data[i]||0,y1=Y(base+v),y0=Y(base),hh=Math.max(0,y0-y1);
      s+=`<rect x="${(padL+i*gap+(gap-bw)/2).toFixed(1)}" y="${y1.toFixed(1)}" width="${bw.toFixed(1)}" height="${hh.toFixed(1)}" fill="${sr.color}" opacity="${fc?0.5:1}"/>`;
      base+=v;});}
  lines.forEach(l=>{const pts=l.data.map((v,i)=>[X(i),Y(v)]);
    s+=`<path d="${smoothPath(pts)}" fill="none" stroke="${l.color}" stroke-width="2.2" stroke-linecap="round" ${l.dashed?'stroke-dasharray="5 4"':''}/>`;
    const last=pts[pts.length-1]; s+=`<circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="${full?3.5:2.6}" fill="${l.color}" stroke="#fff" stroke-width="1.4"/>`;});
  let fdiv=''; if(ff>0)fdiv=`<line x1="${X(ff).toFixed(1)}" y1="${padT}" x2="${X(ff).toFixed(1)}" y2="${(padT+ih).toFixed(1)}" stroke="var(--border)" stroke-dasharray="2 3"/><text x="${(X(ff)+4).toFixed(1)}" y="${(padT+9).toFixed(1)}" font-size="${full?10:8}" fill="var(--text-3)">forecast</text>`;
  let leg=''; if(showLeg){let lx=padL; const ly=h-9;
    leg=series.concat(lines).map(it=>{const isLine=lines.includes(it);
      const sw=isLine?`<line x1="${lx}" y1="${ly-4}" x2="${lx+14}" y2="${ly-4}" stroke="${it.color}" stroke-width="2.5" ${it.dashed?'stroke-dasharray="4 3"':''}/>`:`<rect x="${lx}" y="${ly-9}" width="11" height="9" rx="2" fill="${it.color}"/>`;
      const tx=`<text x="${lx+(isLine?18:15)}" y="${ly}" font-size="10" fill="var(--text-2)">${it.name}</text>`;
      lx+=(isLine?18:15)+it.name.length*5.8+18; return sw+tx;}).join('');}
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">${grid}${s}${fdiv}${xl}${leg}</svg>`;
}

function plRows(d){

  const varc=-Math.round(R*.62),varcn=-Math.round(Rn*.62),cm=R+oth+reg+varc,cmn=Rn+othn+regn+varcn;
  const fix=-Math.round(R*.07),tax=-Math.round(R*.078),taxn=-Math.round(Rn*.078),np=cm+fix+tax,npn=cmn+fix+taxn;
  const r=(cls,l,a,b)=>`<tr class="${cls}"><td>${l}</td><td class="num">${typeof a==='number'?money0(a):a}</td><td class="num">${typeof b==='number'?money0(b):b}</td></tr>`;
  return `<table class="pl">
    ${r('hd','Operating flows','L12M','N12M')}
    ${r('','Revenue',R,Rn)}${r('sub','YoY growth','',(g*100).toFixed(1)+'%')}
    ${r('','Other revenue',oth,othn)}${r('','Regular inflows',reg,regn)}${r('','Variable costs',varc,varcn)}
    ${r('tot','Cash margin',cm,cmn)}${r('sub','Cash margin %',(cm/R*100).toFixed(1)+'%',(cmn/Rn*100).toFixed(1)+'%')}
    ${r('','Fixed costs',fix,fix)}${r('','Taxes',tax,taxn)}
    ${r('tot','Cash net profit',np,npn)}${r('sub','Net margin %',(np/R*100).toFixed(1)+'%',(npn/Rn*100).toFixed(1)+'%')}
  </table>`;
}

function toggleSrc(id,k){FCST[id].sources[k]=!FCST[id].sources[k];
  const el=document.getElementById('srcchips'); if(el)el.innerHTML=srcChips(id);
  drawRev(id); toast(FCST[id].sources[k]?k+' included in forecast':k+' → other revenue (lower weight)');}
function drawRev(id){const d=byId(id),f=FCST[id];
  let base=baseRev(d);
  if(f.basis==='ecom')base=base.map((v,i)=>v*(1+.05*Math.sin(i/2)));   // platform basis uses fuller history
  const incl=Object.values(f.sources).filter(Boolean).length/5;
  const mean=base.reduce((a,b)=>a+b,0)/base.length, dk=Math.min(1,(f.damp||0)/20);
  const adj=base.map((v,i)=>{
    let x = i<12 ? v : (f.scen==='opt'?v*(1+.01*(i-12)):f.scen==='pess'?v*(1-.02*(i-12)):v);
    x = x*(1-dk)+mean*dk;                    // seasonality dampening → toward mean
    return x*(0.55+0.45*incl);               // excluded sources reduce forecast weight
  });
  document.getElementById('revchart').innerHTML=axedChart(C(adj,'bars','var(--brand-600)',12),640,230,true);
  const lab=document.getElementById('revscenlab');
  if(lab)lab.textContent=`${f.basis==='cash'?'Cash basis':'E-commerce basis'} · ${({base:'baseline',opt:'optimistic',pess:'pessimistic'})[f.scen]} · dampening k=${f.damp}`;}
function drawCost(d){const c=seededSeries(31,24,d.preoffer/12*.66,d.preoffer/26,0);
  document.getElementById('costchart').innerHTML=axedChart(C(c,'bars','#d9a441'),640,210,true);}
function fcChart(adj){
  const w=560,h=150,n=adj.length,mx=Math.max(...adj)*1.12||1,bw=w/n*.62,gap=w/n;
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${adj.map((v,i)=>{const bh=v/mx*(h-24);return `<rect x="${i*gap+gap*.19}" y="${h-18-bh}" width="${bw}" height="${bh}" fill="${i<12?'var(--brand-600)':'#9fd3d4'}" rx="1"/>`}).join('')}
    <line x1="${w/2}" y1="6" x2="${w/2}" y2="${h-18}" stroke="var(--border)" stroke-dasharray="3 3"/>
    <text x="${w/2-5}" y="13" text-anchor="end" font-size="10" fill="var(--text-3)">actual</text>
    <text x="${w/2+5}" y="13" font-size="10" fill="var(--text-3)">forecast →</text></svg>`;
}
/* debt facilities + editable schedule */
function debtLoans(d){
  if(d.id==='ORG-6109')return [['Meridian Finance (undisclosed)','Term',310000,26000],['Uncapped','Term',88000,9500]];
  if(d.id==='ORG-5573')return [['Uncapped MCA','MCA',22000,3800]];
  return [['Uncapped LOC','LOC',64000,7200],['Uncapped Term','Term',71000,8100]];
}
function debtRows(d){return debtLoans(d).map((l,i)=>`<tr id="dl${i}"><td>${l[0]}</td><td>${l[1]}</td>
   <td class="num mono">${money0(l[2])}</td><td class="num mono">${money0(l[3])}</td>
   <td><span class="chip c-neutral" id="dls${i}">Included</span></td>
   <td style="white-space:nowrap"><button class="btn btn-outline btn-sm" onclick="toggleExclude(${i})">Exclude</button>
     <button class="btn btn-outline btn-sm" onclick="alert('Refinance — folds this facility into the new offer (flow in polish pass)')">Refinance</button>
     <button class="btn btn-outline btn-sm" onclick="openSchedule('${d.id}',${i})">Edit schedule</button></td></tr>`).join('');}
function toggleExclude(i){const c=document.getElementById('dls'+i),on=c.textContent==='Included';
  c.textContent=on?'Excluded':'Included';c.className='chip '+(on?'c-error':'c-neutral');
  document.getElementById('dl'+i).style.opacity=on?'.5':'1';}

/* modals */
function openOverlay(html){const o=document.createElement('div');o.className='overlay';o.id='ovl';o.innerHTML=html;
  o.onclick=e=>{if(e.target===o)closeOverlay();};document.body.appendChild(o);}
function closeOverlay(){const o=document.getElementById('ovl');if(o)o.remove();}
function openSchedule(id,i){const l=debtLoans(byId(id))[i];
  const months=['2026-08','2026-09','2026-10','2026-11','2026-12','2027-01','2027-02','2027-03'];
  const rows=months.map(m=>`<tr><td>${m}</td><td class="num rocell">${money0(l[3])}</td>
    <td class="num"><input class="editcell" value="${Math.round(l[3])}" onchange="this.classList.add('chg')"></td></tr>`).join('');
  openOverlay(`<div class="modal" style="max-width:560px"><div class="mh"><h3>Edit schedule — ${l[0]}</h3><div class="x" onclick="closeOverlay()">✕</div></div>
   <div class="mb"><p class="muted small" style="margin:0 0 10px">History is read-only. Edit forecast payments — changed cells turn amber.
     <a href="#" onclick="document.querySelectorAll('#ovl .editcell.chg').forEach(e=>{e.value=${Math.round(l[3])};e.classList.remove('chg')});return false;">Revert all</a></p>
   <table class="grid flat"><thead><tr><th>Month</th><th class="num">Model forecast</th><th class="num">Override</th></tr></thead><tbody>${rows}</tbody></table>
   <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline btn-sm" onclick="closeOverlay()">Cancel</button><button class="btn btn-primary btn-sm" onclick="closeOverlay()">Apply</button></div></div></div>`);
}
function openModel(id){const d=byId(id);
  const cats=['Revenue','Other revenue','Regular inflows','Variable costs','Fixed costs','Taxes','Debt repayment','Uncategorised'];
  const months=['24-09','24-11','25-01','25-03','25-05','25-07','25-09','25-11','26-01','26-03','26-05','26-07','26-09','26-11'];
  const hist=8; // first 8 columns are history (read-only)
  const head=`<tr><th style="text-align:left">Category</th>${months.map((m,j)=>`<th class="num">${m}${j>=hist?' ·f':''}</th>`).join('')}</tr>`;
  const body=cats.map((c,ci)=>{const sign=(ci>=3?-1:1);const ser=seededSeries(ci*13+7,months.length,d.preoffer/12*(ci===0?1:.2),d.preoffer/22,d.revTrend==='down'?-.2:.1);
    return `<tr><td style="font-weight:600">${c}</td>${ser.map((v,j)=>{const val=Math.round(sign*v);
      return j<hist?`<td class="num rocell">${money0(val)}</td>`:`<td class="num"><input class="editcell" value="${val}" onchange="this.classList.add('chg')"></td>`}).join('')}</tr>`;}).join('');
  openOverlay(`<div class="modal"><div class="mh"><h3>Full cashflow model — ${d.org}</h3>
     <span class="muted small">history read-only · forecast (·f) editable · changed cells turn amber</span><div class="x" onclick="closeOverlay()">✕</div></div>
   <div class="mb"><div style="overflow:auto"><table class="grid flat" style="font-size:12px">${head}${body}</table></div>
   <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline btn-sm" onclick="closeOverlay()">Close</button><button class="btn btn-primary btn-sm" onclick="closeOverlay()">Apply overrides</button></div></div></div>`);
}

/* ---------- CATEGORISATION TAB ---------- */
const CATG={};
const CAT_OPTS=['Revenue','Variable costs','Fixed costs','Taxes','Debt repayment','Owners inflow','Unreconciled intra-company','Special inflow','Uncategorised'];
function txnData(d){
  const rows=[
    ['2026-06-28','AMAZON PAYMENTS INC — payout',42180,'Revenue',99,false],
    ['2026-06-27','SHOPIFY transfer',8110,'Revenue',97,false],
    ['2026-06-25','Inventory — supplier co.',-21540,'Variable costs',95,false],
    ['2026-06-24','Meta ads',-6260,'Variable costs',96,false],
    ['2026-06-22','Payroll run',-14100,'Fixed costs',98,false],
    ['2026-06-20','WIRE IN — ref 8841',60000,'Uncategorised',38,true],
    ['2026-06-18','ATM deposit',5000,'Uncategorised',44,true],
    ['2026-06-15','Transfer to ••••4231',-18000,'Unreconciled intra-company',52,true],
    ['2026-06-12','Card processor fee',-980,'Variable costs',93,false],
    ['2026-06-10','Loan repayment — lender',-9500,'Debt repayment',90,false],
    ['2026-06-08','Tax payment — HMRC',-12400,'Taxes',97,false],
    ['2026-06-05','Remote deposit',3200,'Uncategorised',49,true],
  ];
  return rows.map(r=>({date:r[0],desc:r[1],amt:r[2],cat:r[3],conf:r[4],flag:r[5]}));
}
function tabCateg(d){CATG[d.id]=CATG[d.id]||{sub:'tx',filter:'all',txns:txnData(d)};renderCateg(d.id);}
function renderCateg(id){
  const d=byId(id),st=CATG[id],tx=st.txns;
  const flagged=tx.filter(t=>t.flag),toReview=flagged.length,absVal=flagged.reduce((s,t)=>s+Math.abs(t.amt),0);
  const conf=Math.round(tx.reduce((s,t)=>s+t.conf,0)/tx.length);
  const issues=d.hygiene.filter(h=>h[1]!=='g').length;
  const rows=(st.filter==='flagged'?flagged:tx);
  const body= st.sub==='tx' ? `
    <table class="grid flat"><thead><tr><th>Date</th><th>Description</th><th class="num">Amount</th><th>Category</th><th class="num">Confidence</th></tr></thead>
    <tbody>${rows.map(t=>{const gi=tx.indexOf(t),cc=t.conf<60?'lo':t.conf<85?'mid':'hi';
      return `<tr class="${t.flag?'flagged':''}"><td class="mono">${t.date}</td><td>${t.desc}</td><td class="num mono">${money(t.amt)}</td>
      <td><select class="txsel" onchange="recat('${id}',${gi},this.value)">${CAT_OPTS.map(o=>`<option ${o===t.cat?'selected':''}>${o}</option>`).join('')}</select></td>
      <td class="num"><span class="conf ${cc}">${t.conf}%</span></td></tr>`}).join('')}
    ${rows.length?'':'<tr><td colspan="5" class="muted" style="text-align:center;padding:20px">Nothing left to review — all clear ✓</td></tr>'}</tbody></table>`
    : monthlyPL(d);
  document.getElementById('pane').innerHTML=`
    <div class="catbtns">
      <button class="catbtn ${st.filter==='flagged'?'on':''}" onclick="catFilter('${id}')">
        <div class="k">Transactions to review</div><div class="v" style="color:${toReview?'var(--warning)':'var(--success)'}">${toReview}</div>
        <div class="s">${money0(absVal)} absolute · click to ${st.filter==='flagged'?'show all':'triage'}</div></button>
      <div class="catbtn" style="cursor:default">
        <div class="k">Categorisation confidence</div>
        <div class="v" style="color:${conf>=85?'var(--success)':conf>=70?'var(--amber-t)':'var(--red-t)'}">${conf}%</div>
        <div class="s">mean across ${tx.length} transactions</div></div>
      <div class="catbtn" style="cursor:default">
        <div class="k">Data issues found</div><div class="v" style="color:${issues?'var(--warning)':'var(--success)'}">${issues}</div>
        <div class="s">from data-hygiene checks</div></div>
    </div>
    <div class="subtabs">
      <div class="st ${st.sub==='tx'?'on':''}" onclick="catSub('${id}','tx')">Transactions</div>
      <div class="st ${st.sub==='pl'?'on':''}" onclick="catSub('${id}','pl')">Monthly P&amp;L</div></div>
    <div class="card"><div style="overflow:auto">${body}</div></div>`;
}
function catFilter(id){CATG[id].filter=CATG[id].filter==='flagged'?'all':'flagged';renderCateg(id);}
function catSub(id,s){CATG[id].sub=s;renderCateg(id);}
function recat(id,i,val){const t=CATG[id].txns[i];t.cat=val;
  if(val!=='Uncategorised'&&val!=='Unreconciled intra-company'){t.conf=100;t.flag=false;}
  renderCateg(id);toast('Re-categorised → '+val);}
function monthlyPL(d){
  const cats=['Revenue','Variable costs','Fixed costs','Taxes','Debt repayment','Uncategorised'];
  const months=['2026-06','2026-05','2026-04','2026-03','2026-02','2026-01','2025-12','2025-11'];
  return `<table class="grid flat" style="font-size:12px"><thead><tr><th>Category</th>${months.map(m=>`<th class="num">${m}</th>`).join('')}</tr></thead>
   <tbody>${cats.map((c,ci)=>{const sign=(ci>=1&&c!=='Uncategorised')?-1:1;const ser=seededSeries(ci*17+3,months.length,d.preoffer/12*(ci===0?1:.18),d.preoffer/24,0);
     return `<tr><td style="font-weight:600">${c}</td>${ser.map(v=>`<td class="num rocell">${money(Math.round(sign*v))}</td>`).join('')}</tr>`}).join('')}</tbody></table>`;
}

/* ---------- MAKE DECISION + shared UI ---------- */
function openDecision(id){const d=byId(id);
  const fields=[['Max advance / facility',d.maxAmount?money0(d.maxAmount):'£0'],['Min advance / draw','£15,000'],['Currency','GBP'],
    ['Max term','10 months'],['Collection frequency','Every 15 days'],['Cash fee','0.88% / mo'],['Security',d.rating==='B'?'No':'Yes'],['Product',d.products[0]||'—']];
  openOverlay(`<div class="modal" style="max-width:640px"><div class="mh"><h3>Make decision — ${d.org}</h3><div class="x" onclick="closeOverlay()">✕</div></div>
   <div class="mb">
     <div class="ctlbar"><span class="lbl">Decision</span><div class="scen" style="margin-left:8px">
       <button class="${d.decision==='Approve'?'on':''}" onclick="pickDec(this)">Approve</button>
       <button class="${d.decision==='Undetermined'?'on':''}" onclick="pickDec(this)">Request info</button>
       <button class="${d.decision==='Reject'?'on':''}" onclick="pickDec(this)">Reject</button></div></div>
     <div class="card" style="box-shadow:none"><div class="card-h"><h3>Recommended offer</h3><span class="sub">Offer A · suggested by the model · editable</span></div>
       <div class="card-b"><table class="grid flat">${fields.map(f=>`<tr><td style="color:var(--text-3);font-weight:600;width:200px">${f[0]}</td>
         <td><input class="editcell" style="width:170px;text-align:left" value="${f[1]}"></td></tr>`).join('')}</table></div></div>
     <p class="muted small" style="margin:11px 0 0">A second offer (e.g. a LOC) can be added as Offer B. Recorded for risk sign-off — not final until signed off.</p>
     <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
       <button class="btn btn-outline btn-sm" onclick="closeOverlay()">Cancel</button>
       <button class="btn btn-outline btn-sm" onclick="toast('Offer B added')">+ Add offer B</button>
       <button class="btn btn-primary btn-sm" onclick="closeOverlay();toast('Decision recorded — sent for risk sign-off')">Confirm decision</button></div>
   </div></div>`);
}
function pickDec(b){b.parentNode.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent='✓ '+msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
let GAL={list:[],idx:0};
function expandChart(id){
  GAL.list=[...document.querySelectorAll('#pane .minic')].map(e=>e.dataset.cid).filter(x=>CHARTS[x]);
  if(!GAL.list.length)GAL.list=[id];
  GAL.idx=Math.max(0,GAL.list.indexOf(id));
  openOverlay(`<div class="modal chartmodal" style="max-width:980px" id="chartmodal"></div>`);
  galleryRender();
}
function galleryNav(dir){GAL.idx=Math.min(GAL.list.length-1,Math.max(0,GAL.idx+dir));galleryRender();}
function gallerySet(i){GAL.idx=i;galleryRender();}
function galleryRender(){const c=CHARTS[GAL.list[GAL.idx]],m=document.getElementById('chartmodal');if(!m||!c)return;
  m.innerHTML=`
   <div class="mh"><h3>${c.title}</h3><span class="muted small">${GAL.idx+1} / ${GAL.list.length} · monthly</span><div class="x" onclick="closeOverlay()">✕</div></div>
   <div class="mb galbody">
     <div class="galstage">
       <button class="galnav" ${GAL.idx===0?'disabled':''} onclick="galleryNav(-1)" title="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6"/></svg></button>
       <div class="galmain">${axedChart(c,900,410,true)}</div>
       <button class="galnav" ${GAL.idx===GAL.list.length-1?'disabled':''} onclick="galleryNav(1)" title="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></button>
     </div>
     <div class="galthumbs">${GAL.list.map((cid,i)=>`<button class="galthumb ${i===GAL.idx?'on':''}" onclick="gallerySet(${i})"><div class="gtlab">${CHARTS[cid].title}</div>${axedChart(CHARTS[cid],240,74,false)}</button>`).join('')}</div>
   </div>`;
}
document.addEventListener('keydown',function(e){if(!document.getElementById('chartmodal'))return;
  if(e.key==='ArrowLeft')galleryNav(-1);else if(e.key==='ArrowRight')galleryNav(1);else if(e.key==='Escape')closeOverlay();});

function stub(name,detail){document.getElementById('pane').innerHTML=`<div class="stub"><b>${name}</b><div style="margin-top:6px">${detail}</div></div>`;}

route();
</script>
